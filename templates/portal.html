<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal · Suporte Técnico</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root {
      --bg: #f0f2f5; --surface: #fff; --surface2: #f9fafb; --border: #e5e7eb;
      --text: #111; --text2: #6b7280; --text3: #9ca3af;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #141720; --border: #2d3148;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; transition: background .2s, border-color .2s, color .1s; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); display: flex; flex-direction: column; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; }
    .nav { display: flex; gap: 6px; align-items: center; }
    .nav a { font-size: 12px; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-weight: 500; color: var(--text2); }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
    .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .portal { width: 100%; max-width: 600px; }
    .saudacao { text-align: center; margin-bottom: 32px; }
    .saudacao-nome { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .saudacao-sub { font-size: 14px; color: var(--text2); }
    .modulos { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modulo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; cursor: pointer; text-decoration: none; transition: all .2s; display: flex; flex-direction: column; gap: 16px; }
    .modulo-card:hover { border-color: var(--cor); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .modulo-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .modulo-titulo { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .modulo-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }
    .modulo-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
    .badge.blue { background: #dbeafe; color: #1d4ed8; }
    .badge.amber { background: #fef3c7; color: #92400e; }
    .badge.green { background: #dcfce7; color: #166534; }
    .badge.red { background: #fee2e2; color: #991b1b; }
    .badge.gray { background: #f3f4f6; color: #6b7280; }
    [data-theme="dark"] .badge.blue { background: #1e3a5f; color: #93c5fd; }
    [data-theme="dark"] .badge.amber { background: #422006; color: #fcd34d; }
    [data-theme="dark"] .badge.green { background: #052e16; color: #86efac; }
    [data-theme="dark"] .badge.red { background: #450a0a; color: #fca5a5; }
    [data-theme="dark"] .badge.gray { background: #1f2937; color: #9ca3af; }
    .card-chamados { --cor: #6366f1; }
    .card-os { --cor: #059669; }
    .icon-chamados { background: #eef2ff; }
    .icon-os { background: #f0fdf4; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Suporte Técnico</div>
    <div class="nav">
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <a href="/logout">Sair</a>
    </div>
  </div>

  <div class="content">
    <div class="portal">
      <div class="saudacao">
        <div class="saudacao-nome">Olá, <span id="nome-usuario">...</span> 👋</div>
        <div class="saudacao-sub">Selecione o módulo que deseja acessar</div>
      </div>
      <div class="modulos" id="modulos"></div>
    </div>
  </div>

  <script>
    function initTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const c = document.documentElement.getAttribute('data-theme');
      const n = c === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
      document.getElementById('theme-btn').textContent = n === 'dark' ? '☀️' : '🌙';
    }

    async function carregarPortal() {
      try {
        const [emailRes, statsRes] = await Promise.all([
          fetch('/api/meu-email'),
          fetch('/api/portal-stats')
        ]);
        const { email, nome, role, modulos } = await emailRes.json();
        document.getElementById('nome-usuario').textContent = nome || email.split('@')[0];

        const stats = statsRes.ok ? await statsRes.json() : {};
        const div = document.getElementById('modulos');
        let html = '';

        const temChamados = !modulos || modulos.includes('chamados') || role === 'admin' || role === 'colaborador';
        const temOS = modulos && (modulos.includes('ordens_servico') || modulos.includes('financeiro'));
        const isAdmin = role === 'admin';
        const isAdminOS = modulos && modulos.includes('ordens_servico');

        if (temChamados) {
          const destino = isAdmin ? '/admin' : '/meus-chamados';
          const badgesC = [];
          if (stats.chamados_novos > 0) badgesC.push('<span class="badge blue">' + stats.chamados_novos + ' novos</span>');
          if (stats.chamados_aguardando > 0) badgesC.push('<span class="badge amber">' + stats.chamados_aguardando + ' aguardando</span>');
          if (stats.chamados_respondidos > 0) badgesC.push('<span class="badge green">' + stats.chamados_respondidos + ' respondidos</span>');
          if (!badgesC.length) badgesC.push('<span class="badge gray">Nenhuma pendência</span>');
          html += '<a href="' + destino + '" class="modulo-card card-chamados">' +
            '<div class="modulo-icon icon-chamados"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>' +
            '<div><div class="modulo-titulo">Chamados</div><div class="modulo-desc">Abra e acompanhe chamados de suporte técnico para os sistemas de saúde.</div></div>' +
            '<div class="modulo-badges">' + badgesC.join('') + '</div>' +
          '</a>';
        }

        const temFinanceiro = modulos && modulos.includes('financeiro');

        if (temOS) {
          const isFinanceiro = modulos && modulos.includes('financeiro') && !modulos.includes('ordens_servico');
          const destino = (isAdminOS || isFinanceiro) ? '/os' : '/os/colaborador';
          const badgesOS = [];
          if (stats.os_pendentes > 0) badgesOS.push('<span class="badge amber">' + stats.os_pendentes + ' pendentes</span>');
          if (stats.os_prestacao > 0) badgesOS.push('<span class="badge red">' + stats.os_prestacao + ' prestação</span>');
          if (!badgesOS.length) badgesOS.push('<span class="badge gray">Nenhuma pendência</span>');
          html += '<a href="' + destino + '" class="modulo-card card-os">' +
            '<div class="modulo-icon icon-os"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>' +
            '<div><div class="modulo-titulo">Ordens de Serviço</div><div class="modulo-desc">Visualize suas O.S, acompanhe viagens e faça prestação de contas.</div></div>' +
            '<div class="modulo-badges">' + badgesOS.join('') + '</div>' +
          '</a>';
        }

        const temColaborador = modulos && modulos.includes('colaborador');
        if (temColaborador) {
          const badgesColab = [];
          if (stats.os_pendentes > 0) badgesColab.push('<span class="badge amber">' + stats.os_pendentes + ' pendentes</span>');
          if (stats.os_prestacao > 0) badgesColab.push('<span class="badge red">' + stats.os_prestacao + ' devolvidas</span>');
          if (!badgesColab.length) badgesColab.push('<span class="badge gray">Nenhuma pendência</span>');
          html += '<a href="/colaborador/os" class="modulo-card" style="--cor:#059669">' +
            '<div class="modulo-icon" style="background:#f0fdf4"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>' +
            '<div><div class="modulo-titulo">Minhas Viagens</div><div class="modulo-desc">Acompanhe suas ordens de serviço e envie prestações de contas.</div></div>' +
            '<div class="modulo-badges">' + badgesColab.join('') + '</div>' +
          '</a>';
        }
        if (temFinanceiro && !isAdminOS) {
          html += '<a href="/financeiro" class="modulo-card" style="--cor:#d97706">' +
            '<div class="modulo-icon" style="background:#fef3c7"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>' +
            '<div><div class="modulo-titulo">Financeiro</div><div class="modulo-desc">Analise prestações de contas e gerencie o financeiro das O.S.</div></div>' +
            '<div class="modulo-badges"><span class="badge amber">Prestações</span></div>' +
          '</a>';
        }
        if (role === 'admin') {
          html += '<a href="/configuracoes" class="modulo-card" style="--cor:#6366f1;border-color:var(--border)">' +
            '<div class="modulo-icon" style="background:#eef2ff"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>' +
            '<div><div class="modulo-titulo">Administração</div><div class="modulo-desc">Gerencie usuários, municípios, departamentos e configurações do sistema.</div></div>' +
            '<div class="modulo-badges"><span class="badge gray">Configurações</span></div>' +
          '</a>';
        }

        if (!html) {
          html = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);font-size:13px">Nenhum módulo disponível para seu perfil.</div>';
        }

        div.innerHTML = html;

        if (temChamados && !temOS) {
          window.location = isAdmin ? '/admin' : '/meus-chamados';
        }
      } catch(e) {
        console.error(e);
      }
    }

    initTheme();
    carregarPortal();
  </script>
</body>
</html>
