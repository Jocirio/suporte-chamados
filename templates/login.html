<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Inovatus Sistemas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #10b981;
      --primary-hover: #059669;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    /* Versão Clara para o Login (Opcional, mas mantendo a estrutura) */
    [data-theme="light"] {
      --bg-gradient: linear-gradient(135deg, #f0f2f5 0%, #e2e8f0 100%);
      --glass: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.05);
      --text-main: #1e293b;
      --text-dim: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Glow de fundo */
    body::before {
      content: "";
      position: absolute;
      top: -10%; right: -10%;
      width: 40%; height: 40%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
      z-index: 0;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .login-card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .logo-dot {
      width: 12px;
      height: 12px;
      border-radius: 4px;
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary);
    }

    .logo-text {
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .sub {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    [data-theme="light"] .form-group input {
      background: #fff;
      color: #1e293b;
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.3);
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-login:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
    }

    .footer-links {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .footer-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    /* Mensagens de Alerta */
    .msg-box {
      font-size: 13px;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }

    .erro { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .sucesso { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }

  </style>
</head>
<body data-theme="dark">

  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>

  <div class="login-card">
    <div class="logo-area">
      <div class="logo-dot"></div>
      <div class="logo-text">Inovatus Sistemas</div>
    </div>

    <h1>Bem-vindo</h1>
    <p class="sub">Acesse a plataforma de suporte e gestão.</p>

    <div id="msg"></div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label>E-mail Corporativo</label>
        <input type="email" name="email" placeholder="nome@inovatus.com.br" required>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login">
        Entrar na Plataforma
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
      </button>
    </form>

    <div class="footer-links">
      Não possui acesso? <a href="/registrar">Solicitar conta</a>
    </div>
  </div>

  <script>
    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark'; // Padrão agora é dark por ser mais moderno
      document.body.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const current = document.body.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    // Processa avisos da URL
    const p = new URLSearchParams(window.location.search);
    const msgDiv = document.getElementById('msg');
    if (p.get('erro')) msgDiv.innerHTML = '<div class="msg-box erro">E-mail ou senha incorretos.</div>';
    if (p.get('cadastro')) msgDiv.innerHTML = '<div class="msg-box sucesso">Conta criada com sucesso!</div>';

    initTheme();
  </script>
</body>
</html>
