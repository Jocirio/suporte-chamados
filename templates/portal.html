<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal · Inovatus Sistemas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #10b981;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    /* Brilho sutil no fundo */
    body::before {
      content: "";
      position: absolute;
      top: -10%; left: -10%;
      width: 40%; height: 40%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
      z-index: -1;
    }

    .topbar {
      padding: 1.2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-weight: 800;
      letter-spacing: -1px;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }

    .nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .nav a:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }

    .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .portal-container { width: 100%; max-width: 900px; }

    .saudacao { margin-bottom: 3rem; }
    .saudacao-nome { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .saudacao-sub { color: var(--text-dim); font-size: 1rem; }

    /* Grid Moderno */
    .modulos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .modulo-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .modulo-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .icon-wrapper {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
    }

    .modulo-titulo { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
    .modulo-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 1.5rem; }

    .modulo-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      padding: 4px 12px; border-radius: 100px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
    }

    /* Cores das Badges */
    .badge.blue { color: #60a5fa; border-color: rgba(96, 165, 250, 0.2); }
    .badge.amber { color: #fbbf24; border-color: rgba(251, 191, 36, 0.2); }
    .badge.green { color: #34d399; border-color: rgba(52, 211, 153, 0.2); }
    .badge.red { color: #f87171; border-color: rgba(248, 113, 113, 0.2); }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>INOVATUS.</div>
    <div class="nav">
      <a href="/logout">Encerrar Sessão</a>
    </div>
  </div>

  <div class="content">
    <div class="portal-container">
      <div class="saudacao">
        <div class="saudacao-nome">Olá, <span id="nome-usuario" style="color:var(--primary)">...</span> 👋</div>
        <div class="saudacao-sub">Gerencie suas operações e fluxos técnicos.</div>
      </div>

      <div class="modulos-grid" id="modulos-container">
        </div>
    </div>
  </div>

  <script>
    async function carregarPortal() {
      try {
        const [emailRes, statsRes] = await Promise.all([
          fetch('/api/meu-email'),
          fetch('/api/portal-stats')
        ]);
        
        const { email, nome, role, modulos } = await emailRes.json();
        document.getElementById('nome-usuario').textContent = nome || email.split('@')[0];

        const stats = statsRes.ok ? await statsRes.json() : {};
        const container = document.getElementById('modulos-container');
        let html = '';

        const temChamados = !modulos || modulos.includes('chamados') || role === 'admin';
        const temOS = modulos && (modulos.includes('ordens_servico') || modulos.includes('financeiro'));
        const isAdmin = role === 'admin';

        // CARD CHAMADOS
        if (temChamados) {
          const destino = isAdmin ? '/admin' : '/meus-chamados';
          const badges = [];
          if (stats.chamados_novos > 0) badges.push(`<span class="badge blue">${stats.chamados_novos} Novos</span>`);
          if (stats.chamados_aguardando > 0) badges.push(`<span class="badge amber">${stats.chamados_aguardando} Pendentes</span>`);
          
          html += `
            <a href="${destino}" class="modulo-card">
              <div>
                <div class="icon-wrapper" style="background: rgba(99, 102, 241, 0.1); color: #818cf8;">
                  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path></svg>
                </div>
                <div class="modulo-titulo">Chamados</div>
                <div class="modulo-desc">Suporte técnico especializado e monitoramento de sistemas de saúde.</div>
              </div>
              <div class="modulo-badges">${badges.join('') || '<span class="badge">Sem pendências</span>'}</div>
            </a>`;
        }

        // CARD O.S / VIAGENS
        if (temOS || modulos?.includes('colaborador')) {
          const isGestor = isAdmin || modulos?.includes('ordens_servico') || modulos?.includes('financeiro');
          const destino = isGestor ? '/os' : '/colaborador/os';
          const badges = [];
          if (stats.os_pendentes > 0) badges.push(`<span class="badge amber">${stats.os_pendentes} OS Abertas</span>`);
          if (stats.os_prestacao > 0) badges.push(`<span class="badge red">Prestação Pendente</span>`);

          html += `
            <a href="${destino}" class="modulo-card">
              <div>
                <div class="icon-wrapper" style="background: rgba(16, 185, 129, 0.1); color: var(--primary);">
                  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div class="modulo-titulo">Ordens de Serviço</div>
                <div class="modulo-desc">Gestão de viagens, diárias e conformidade técnica de prestações.</div>
              </div>
              <div class="modulo-badges">${badges.join('') || '<span class="badge">Tudo em dia</span>'}</div>
            </a>`;
        }

        // CARD ADMIN
        if (isAdmin) {
          html += `
            <a href="/configuracoes" class="modulo-card">
              <div>
                <div class="icon-wrapper" style="background: rgba(251, 191, 36, 0.1); color: #fbbf24;">
                  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                </div>
                <div class="modulo-titulo">Administração</div>
                <div class="modulo-desc">Gerenciamento global de usuários, clientes e parâmetros do sistema.</div>
              </div>
              <div class="modulo-badges"><span class="badge">Configurações</span></div>
            </a>`;
        }

        container.innerHTML = html;

        // Auto-redirecionamento se tiver apenas chamados (como era no seu original)
        if (temChamados && !temOS && !modulos?.includes('colaborador') && !isAdmin) {
            window.location = '/meus-chamados';
        }

      } catch(e) { console.error(e); }
    }
    carregarPortal();
  </script>
</body>
</html>
