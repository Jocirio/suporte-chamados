<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro · Ordens de Serviço</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root {
      --bg: #f0f2f5; --surface: #fff; --surface2: #f9fafb; --border: #e5e7eb;
      --text: #111; --text2: #6b7280; --text3: #9ca3af;
      --accent: #6366f1; --accent-hover: #4f46e5;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #141720; --border: #2d3148;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
      --accent: #818cf8; --accent-hover: #6366f1;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; transition: background .2s, border-color .2s, color .1s; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
    .logo { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #059669; }
    .nav { display: flex; gap: 6px; align-items: center; }
    .nav a { font-size: 12px; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-weight: 500; color: var(--text2); transition: all .15s; }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: var(--surface2); color: var(--text); }
    .nav a.primary { background: #059669; color: #fff; }
    .nav a.primary:hover { background: #047857; }
    .theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
    .content { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 24px; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
    .stat { background: var(--surface); border-radius: 12px; padding: 18px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .stat-val { font-size: 22px; font-weight: 600; font-family: monospace; }
    .stat-val.green { color: #059669; }
    .stat-val.amber { color: #d97706; }
    .stat-val.red { color: #dc2626; }
    .stat-val.blue { color: #6366f1; }
    .table-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 24px; }
    .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .filter-row { display: flex; gap: 6px; }
    .chip { font-family: inherit; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--text2); font-weight: 500; transition: all .15s; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .chip:hover:not(.active) { background: var(--surface2); }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .05em; text-transform: uppercase; padding: 12px 18px; text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); }
    td { font-size: 13px; color: var(--text2); padding: 12px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
    .badge.pendente { background: #fef3c7; color: #92400e; }
    .badge.aprovado { background: #dcfce7; color: #166534; }
    .badge.devolvido { background: #fee2e2; color: #991b1b; }
    .badge.emitida { background: #dbeafe; color: #1d4ed8; }
    .badge.aprovada { background: #dcfce7; color: #166534; }
    .badge.prestacao_enviada { background: #fef3c7; color: #92400e; }
    .badge.prestacao_devolvida { background: #fee2e2; color: #991b1b; }
    .badge.encerrada { background: #f3f4f6; color: #6b7280; }
    .num-col { font-family: monospace; font-size: 12px; color: var(--accent); font-weight: 600; }
    .val-col { font-family: monospace; font-size: 12px; color: var(--text); font-weight: 500; }
    .btn-ver { font-family: inherit; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text2); font-weight: 500; transition: all .15s; }
    .btn-ver:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .empty-state { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; width: 640px; max-width: 92%; border: 1px solid var(--border); box-shadow: 0 25px 60px rgba(0,0,0,.2); display: flex; flex-direction: column; max-height: 90vh; overflow: hidden; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text3); }
    .modal-body { overflow-y: auto; padding: 20px 24px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .prestacao-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .prestacao-header { display: flex; justify-content: space-between; align-items: center; }
    .prestacao-tipo { font-size: 13px; font-weight: 600; color: var(--text); }
    .prestacao-valor { font-size: 16px; font-weight: 700; color: #059669; font-family: monospace; }
    .prestacao-desc { font-size: 12px; color: var(--text2); }
    .prestacao-actions { display: flex; gap: 8px; }
    .btn-aprovar-item { font-family: inherit; font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: none; background: #059669; color: #fff; cursor: pointer; }
    .btn-devolver-item { font-family: inherit; font-size: 11px; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: 1px solid #fca5a5; background: transparent; color: #dc2626; cursor: pointer; }
    .btn-devolver-item:hover { background: #fee2e2; }
    .motivo-devolvido { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #991b1b; }
    .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .btn-encerrar { font-family: inherit; font-size: 12px; font-weight: 600; padding: 9px 18px; border-radius: 8px; background: #059669; color: #fff; border: none; cursor: pointer; }
    .btn-fechar { font-family: inherit; font-size: 12px; font-weight: 500; padding: 9px 18px; border-radius: 8px; background: transparent; color: var(--text2); border: 1px solid var(--border); cursor: pointer; }
    .saldo-box { border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .saldo-box.positivo { background: #f0fdf4; border: 1px solid #86efac; }
    .saldo-box.negativo { background: #fef2f2; border: 1px solid #fecaca; }
    .saldo-label { font-size: 13px; font-weight: 600; }
    .saldo-label.positivo { color: #166534; }
    .saldo-label.negativo { color: #991b1b; }
    .saldo-val { font-size: 18px; font-weight: 700; font-family: monospace; }
    .saldo-val.positivo { color: #059669; }
    .saldo-val.negativo { color: #dc2626; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Ordens de Serviço</div>
    <div class="nav" id="nav-menu">
      <a href="/os/financeiro" class="active">Financeiro</a>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <a href="/logout">Sair</a>
    </div>
  </div>

  <div class="content">
    <div class="page-title">💰 Painel Financeiro</div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Total adiantado</div><div class="stat-val blue" id="s-adiantado">R$ 0,00</div></div>
      <div class="stat"><div class="stat-label">Prestações pendentes</div><div class="stat-val amber" id="s-pendentes">0</div></div>
      <div class="stat"><div class="stat-label">Prestações aprovadas</div><div class="stat-val green" id="s-aprovadas">0</div></div>
      <div class="stat"><div class="stat-label">Devolvidas</div><div class="stat-val red" id="s-devolvidas">0</div></div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">O.S com prestação pendente</div>
        <div class="filter-row">
          <button class="chip active" onclick="setFiltro('prestacao_enviada', this)">Aguardando</button>
          <button class="chip" onclick="setFiltro('prestacao_devolvida', this)">Devolvidas</button>
          <button class="chip" onclick="setFiltro('todos', this)">Todas</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Número</th>
            <th>Colaborador</th>
            <th>Município</th>
            <th>Valor O.S</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Prestação de contas — O.S <span id="m-numero"></span></div>
        <button class="modal-close" onclick="fecharModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body">
        <div style="text-align:center;padding:20px;color:var(--text3)">Carregando...</div>
      </div>
      <div class="modal-footer">
        <button class="btn-encerrar" id="btn-encerrar" onclick="encerrarOS()" style="display:none">✔ Encerrar O.S</button>
        <button class="btn-fechar" onclick="fecharModal()">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    let ordens = [], filtroStatus = 'prestacao_enviada', osAtualId = '', osAtualNumero = '';

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const c = document.documentElement.getAttribute('data-theme');
      const n = c === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
      document.getElementById('theme-btn').textContent = n === 'dark' ? '☀️' : '🌙';
    }

    function fmt(v) { return 'R$ ' + parseFloat(v || 0).toFixed(2).replace('.', ','); }
    function fmtData(d) { if (!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR'); }
    function statusLabel(s) {
      const l = { emitida:'Emitida', aprovada:'Aprovada', prestacao_enviada:'Prestação enviada', prestacao_devolvida:'Prestação devolvida', encerrada:'Encerrada' };
      return l[s] || s;
    }

    function setFiltro(s, el) {
      filtroStatus = s;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderizar();
    }

    function renderizar() {
      const lista = filtroStatus === 'todos' ? ordens : ordens.filter(o => o.status === filtroStatus);
      const tbody = document.getElementById('lista');
      if (!lista.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">Nenhuma O.S encontrada.</div></td></tr>'; return; }
      tbody.innerHTML = lista.map(o => {
        const mun = o.clientes ? o.clientes.nome + (o.clientes.estado ? ' — ' + o.clientes.estado : '') : '—';
        return '<tr>' +
          '<td class="num-col">' + o.numero + '</td>' +
          '<td style="color:var(--text)">' + o.colaborador_nome + '</td>' +
          '<td>' + mun + '</td>' +
          '<td class="val-col">' + fmt(o.valor_total) + '</td>' +
          '<td><span class="badge ' + o.status + '">' + statusLabel(o.status) + '</span></td>' +
          '<td><button class="btn-ver" onclick="abrirModal(\'' + o.id + '\', \'' + o.numero + '\')">Analisar</button></td>' +
        '</tr>';
      }).join('');
    }

    async function abrirModal(id, numero) {
      osAtualId = id;
      osAtualNumero = numero;
      document.getElementById('m-numero').textContent = numero;
      document.getElementById('modal-body').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">Carregando...</div>';
      document.getElementById('modal').classList.add('open');

      const [osRes, prestRes] = await Promise.all([
        fetch('/api/os/ordens/' + id, { credentials: 'include' }),
        fetch('/api/os/ordens/' + id + '/prestacao', { credentials: 'include' })
      ]);
      const os = await osRes.json();
      const prestacoes = await prestRes.json();

      const totalAdiant = (os.adiantamentos || []).reduce((s, a) => s + parseFloat(a.valor || 0), 0);
      const totalPrestado = prestacoes.filter(p => p.status === 'aprovado').reduce((s, p) => s + parseFloat(p.valor || 0), 0);
      const saldo = totalAdiant - totalPrestado;

      let html = '';
      if (!prestacoes.length) {
        html = '<div class="empty-state">Nenhuma prestação de contas enviada ainda.</div>';
      } else {
        html = prestacoes.map(p => {
          const aprovado = p.status === 'aprovado';
          const devolvido = p.status === 'devolvido';
          return '<div class="prestacao-item">' +
            '<div class="prestacao-header">' +
              '<div>' +
                '<div class="prestacao-tipo">' + p.tipo + '</div>' +
                '<div class="prestacao-desc">' + p.descricao + '</div>' +
              '</div>' +
              '<div style="text-align:right">' +
                '<div class="prestacao-valor">' + fmt(p.valor) + '</div>' +
                '<span class="badge ' + p.status + '">' + p.status + '</span>' +
              '</div>' +
            '</div>' +
            (p.comprovante_url ? '<div style="font-size:12px">📎 <a href="' + p.comprovante_url + '" target="_blank" style="color:var(--accent)">Ver comprovante</a></div>' : '') +
            (devolvido && p.motivo_devolucao ? '<div class="motivo-devolvido">⚠️ Motivo: ' + p.motivo_devolucao + '</div>' : '') +
            (!aprovado && !devolvido ? '<div class="prestacao-actions">' +
              '<button class="btn-aprovar-item" onclick="aprovarItem(\'' + p.id + '\')">✅ Aprovar</button>' +
              '<button class="btn-devolver-item" onclick="devolverItem(\'' + p.id + '\')">↩ Devolver</button>' +
            '</div>' : '') +
          '</div>';
        }).join('');
      }

      if (totalAdiant > 0) {
        const cls = saldo > 0 ? 'negativo' : 'positivo';
        const label = saldo > 0 ? '⚠️ Colaborador deve devolver' : '✅ Empresa deve pagar ao colaborador';
        html += '<div class="saldo-box ' + cls + '">' +
          '<div class="saldo-label ' + cls + '">' + label + '</div>' +
          '<div class="saldo-val ' + cls + '">' + fmt(Math.abs(saldo)) + '</div>' +
        '</div>';
      }

      document.getElementById('modal-body').innerHTML = html;
      const todasAprovadas = prestacoes.length > 0 && prestacoes.every(p => p.status === 'aprovado');
      document.getElementById('btn-encerrar').style.display = todasAprovadas ? 'inline-block' : 'none';
    }

    async function aprovarItem(id) {
      await fetch('/api/os/prestacao/' + id + '/aprovar', { method: 'POST', credentials: 'include' });
      await abrirModal(osAtualId, osAtualNumero);
      await carregar();
    }

    async function devolverItem(id) {
      const motivo = prompt('Informe o motivo da devolução:');
      if (!motivo || !motivo.trim()) return;
      const form = new FormData();
      form.append('motivo', motivo.trim());
      await fetch('/api/os/prestacao/' + id + '/devolver', { method: 'POST', body: form, credentials: 'include' });
      await abrirModal(osAtualId, osAtualNumero);
      await carregar();
    }

    async function encerrarOS() {
      if (!confirm('Encerrar esta O.S? Esta ação não pode ser desfeita.')) return;
      await fetch('/api/os/ordens/' + osAtualId + '/encerrar', { method: 'POST', credentials: 'include' });
      fecharModal();
      await carregar();
    }

    function fecharModal() { document.getElementById('modal').classList.remove('open'); }
    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) fecharModal(); });

    async function carregar() {
      const res = await fetch('/api/os/ordens', { credentials: 'include' });
      if (res.status === 401) { window.location = '/'; return; }
      ordens = await res.json();

      const totalAdiant = ordens.reduce((s, o) => {
        const adiant = (o.adiantamentos || []).reduce((sa, a) => sa + parseFloat(a.valor || 0), 0);
        return s + adiant;
      }, 0);

      document.getElementById('s-adiantado').textContent = fmt(totalAdiant);
      document.getElementById('s-pendentes').textContent = ordens.filter(o => o.status === 'prestacao_enviada').length;
      document.getElementById('s-aprovadas').textContent = ordens.filter(o => o.status === 'encerrada').length;
      document.getElementById('s-devolvidas').textContent = ordens.filter(o => o.status === 'prestacao_devolvida').length;

      renderizar();
    }

    async function carregarMenu() {
      try {
        const res = await fetch('/api/meu-email', { credentials: 'include' });
        const { role, modulos } = await res.json();
        const nav = document.getElementById('nav-menu');
        const temOS = modulos && modulos.includes('ordens_servico');
        const isAdmin = role === 'admin';
        let links = '';
        if (temOS || isAdmin) links += '<a href="/os">Dashboard</a>';
        if (temOS || isAdmin) links += '<a href="/os/nova" class="primary">+ Nova O.S</a>';
        if (temOS || isAdmin) links += '<a href="/os/config">Configurações</a>';
        links += '<a href="/os/financeiro" class="active">Financeiro</a>';
        links += '<a href="/portal">Portal</a>';
        links += '<button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>';
        links += '<a href="/logout">Sair</a>';
        nav.innerHTML = links;
        initTheme();
      } catch(e) { initTheme(); }
    }

    carregarMenu();
    carregar();
  </script>
</body>
</html>
