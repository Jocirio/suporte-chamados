<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro · Gestão de O.S</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --bg: #f0f2f5; --surface: #fff; --surface2: #f9fafb; --border: #e5e7eb;
      --text: #111; --text2: #6b7280; --text3: #9ca3af;
      --accent: #6366f1; --accent-hover: #4f46e5;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #141720; --border: #2d3148;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
      --accent: #818cf8; --accent-hover: #6366f1;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; transition: background .2s, border-color .2s, color .1s; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
    .logo { font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; }
    
    .nav { display: flex; gap: 8px; align-items: center; }
    .nav a { font-size: 12px; padding: 7px 14px; border-radius: 10px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    
    /* Botões Coloridos */
    .nav a.btn-dash { border: 1px solid #6366f1; color: #6366f1; }
    .nav a.btn-dash.active { background: #6366f1; color: #fff; }
    .nav a.btn-dash:hover:not(.active) { background: rgba(99, 102, 241, 0.1); }

    .nav a.btn-fin { border: 1px solid #f59e0b; color: #f59e0b; }
    .nav a.btn-fin.active { background: #f59e0b; color: #fff; }
    .nav a.btn-fin:hover:not(.active) { background: rgba(245, 158, 11, 0.1); }

    .nav a.primary { background: #10b981; color: #fff; border: 1px solid #10b981; }
    .nav a.primary:hover { background: #059669; }

    .nav a.btn-portal { 
        background: var(--surface2); 
        border: 1px solid var(--border); 
        color: var(--text);
        margin-left: 12px;
        padding: 7px 16px;
        box-shadow: var(--shadow);
    }
    .nav a.btn-portal:hover { border-color: var(--text); background: var(--surface); }

    .theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
    
    .content { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 24px; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
    .stat { background: var(--surface); border-radius: 12px; padding: 18px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .stat-val { font-size: 22px; font-weight: 600; font-family: monospace; }
    .stat-val.green { color: #059669; }
    .stat-val.amber { color: #d97706; }
    .stat-val.red { color: #dc2626; }
    .stat-val.blue { color: #6366f1; }
    
    .table-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 24px; }
    .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .filter-row { display: flex; gap: 6px; }
    .chip { font-family: inherit; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--text2); font-weight: 500; transition: all .15s; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .05em; text-transform: uppercase; padding: 12px 18px; text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); }
    td { font-size: 13px; color: var(--text2); padding: 12px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
    .badge.pendente { background: #fef3c7; color: #92400e; }
    .badge.aprovado { background: #dcfce7; color: #166534; }
    .badge.devolvido { background: #fee2e2; color: #991b1b; }
    
    .btn-ver { font-family: inherit; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text2); font-weight: 500; transition: all .15s; }
    .btn-ver:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; width: 640px; max-width: 92%; border: 1px solid var(--border); box-shadow: 0 25px 60px rgba(0,0,0,.2); display: flex; flex-direction: column; max-height: 90vh; overflow: hidden; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .modal-body { overflow-y: auto; padding: 20px 24px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .prestacao-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .saldo-box { border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .saldo-box.positivo { background: #f0fdf4; border: 1px solid #86efac; }
    .saldo-box.negativo { background: #fef2f2; border: 1px solid #fecaca; }
    .btn-aprovar-item { background: #059669; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-devolver-item { background: transparent; color: #dc2626; border: 1px solid #fca5a5; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-encerrar { background: #059669; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Gestão Global O.S</div>
    <div class="nav" id="nav-menu"></div>
  </div>

  <div class="content">
    <div class="page-title">💰 Auditoria Financeira</div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Total adiantado</div><div class="stat-val blue" id="s-adiantado">R$ 0,00</div></div>
      <div class="stat"><div class="stat-label">Prestações pendentes</div><div class="stat-val amber" id="s-pendentes">0</div></div>
      <div class="stat"><div class="stat-label">Prestações aprovadas</div><div class="stat-val green" id="s-aprovadas">0</div></div>
      <div class="stat"><div class="stat-label">Devolvidas</div><div class="stat-val red" id="s-devolvidas">0</div></div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Prestações de Contas p/ Analisar</div>
        <div class="filter-row">
          <button class="chip active" onclick="setFiltro('prestacao_enviada', this)">Aguardando</button>
          <button class="chip" onclick="setFiltro('prestacao_devolvida', this)">Devolvidas</button>
          <button class="chip" onclick="setFiltro('todos', this)">Todas</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Número</th>
            <th>Colaborador</th>
            <th>Município</th>
            <th>Valor O.S</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Análise de Gastos — O.S <span id="m-numero"></span></div>
        <button class="modal-close" onclick="fecharModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn-encerrar" id="btn-encerrar" onclick="encerrarOS()" style="display:none">✔ Finalizar e Encerrar O.S</button>
        <button class="btn-fechar" onclick="fecharModal()">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    let ordens = [], filtroStatus = 'prestacao_enviada', osAtualId = '', osAtualNumero = '';

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const c = document.documentElement.getAttribute('data-theme');
      const n = c === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
      document.getElementById('theme-btn').textContent = n === 'dark' ? '☀️' : '🌙';
    }

    function fmt(v) { return 'R$ ' + parseFloat(v || 0).toLocaleString('pt-BR', {minimumFractionDigits:2}); }

    function setFiltro(s, el) {
      filtroStatus = s;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderizar();
    }

    function renderizar() {
      const lista = filtroStatus === 'todos' ? ordens : ordens.filter(o => o.status === filtroStatus);
      const tbody = document.getElementById('lista');
      if (!lista.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">Nenhuma O.S aguardando análise.</div></td></tr>'; return; }
      tbody.innerHTML = lista.map(o => `
        <tr>
          <td class="num-col">${o.numero}</td>
          <td style="color:var(--text); font-weight:500">${o.colaborador_nome}</td>
          <td>${o.clientes ? o.clientes.nome : '—'}</td>
          <td class="val-col">${fmt(o.valor_total)}</td>
          <td><span class="badge ${o.status}">${o.status.replace('_', ' ')}</span></td>
          <td><button class="btn-ver" onclick="abrirModal('${o.id}', '${o.numero}')">Analisar</button></td>
        </tr>`).join('');
    }

    async function abrirModal(id, numero) {
      osAtualId = id; osAtualNumero = numero;
      document.getElementById('m-numero').textContent = numero;
      document.getElementById('modal').classList.add('open');
      const [osRes, prestRes] = await Promise.all([
        fetch('/api/os/ordens/'+id), fetch('/api/os/ordens/'+id+'/prestacao')
      ]);
      const os = await osRes.json(), prestacoes = await prestRes.json();
      const totalAdiant = (os.adiantamentos || []).reduce((s, a) => s + parseFloat(a.valor || 0), 0);
      const totalAprovado = prestacoes.filter(p => p.status === 'aprovado').reduce((s, p) => s + parseFloat(p.valor || 0), 0);
      const saldo = totalAdiant - totalAprovado;

      let html = prestacoes.map(p => `
        <div class="prestacao-item">
          <div class="prestacao-header">
            <div><div class="prestacao-tipo">${p.tipo}</div><div class="prestacao-desc">${p.descricao}</div></div>
            <div style="text-align:right"><div class="prestacao-valor">${fmt(p.valor)}</div><span class="badge ${p.status}">${p.status}</span></div>
          </div>
          ${p.comprovante_url ? `<div>📎 <a href="${p.comprovante_url}" target="_blank" style="color:var(--accent)">Ver comprovante</a></div>` : ''}
          ${p.status === 'pendente' ? `<div class="prestacao-actions"><button class="btn-aprovar-item" onclick="aprovarItem('${p.id}')">Aprovar</button><button class="btn-devolver-item" onclick="devolverItem('${p.id}')">Devolver</button></div>` : ''}
        </div>`).join('') || '<div class="empty-state">Sem gastos lançados.</div>';

      if (totalAdiant > 0) {
        const isPos = saldo <= 0;
        html += `<div class="saldo-box ${isPos ? 'positivo' : 'negativo'}">
          <div class="saldo-label">${isPos ? 'Reembolso ao Colaborador' : 'Devolução para Empresa'}</div>
          <div class="saldo-val">${fmt(Math.abs(saldo))}</div></div>`;
      }
      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('btn-encerrar').style.display = (prestacoes.length > 0 && prestacoes.every(p => p.status === 'aprovado')) ? 'block' : 'none';
    }

    async function aprovarItem(id) { await fetch('/api/os/prestacao/'+id+'/aprovar', {method:'POST'}); abrirModal(osAtualId, osAtualNumero); carregar(); }
    async function devolverItem(id) { const m = prompt('Motivo:'); if(m) { const f = new FormData(); f.append('motivo', m); await fetch('/api/os/prestacao/'+id+'/devolver', {method:'POST', body:f}); abrirModal(osAtualId, osAtualNumero); carregar(); } }
    async function encerrarOS() { if(confirm('Encerrar?')) { await fetch('/api/os/ordens/'+osAtualId+'/encerrar', {method:'POST'}); fecharModal(); carregar(); } }
    function fecharModal() { document.getElementById('modal').classList.remove('open'); }

    async function carregar() {
      const res = await fetch('/api/os/ordens');
      ordens = await res.json();
      document.getElementById('s-adiantado').textContent = fmt(ordens.reduce((s,o) => s + (o.adiantamentos||[]).reduce((sa,a)=>sa+parseFloat(a.valor||0),0), 0));
      document.getElementById('s-pendentes').textContent = ordens.filter(o => o.status === 'prestacao_enviada').length;
      document.getElementById('s-aprovadas').textContent = ordens.filter(o => o.status === 'encerrada').length;
      document.getElementById('s-devolvidas').textContent = ordens.filter(o => o.status === 'prestacao_devolvida').length;
      renderizar();
    }

    async function carregarMenu() {
      try {
        const res = await fetch('/api/meu-email');
        const { role, modulos } = await res.json();
        const nav = document.getElementById('nav-menu');
        const path = window.location.pathname;
        const isAdmin = role === 'admin';
        const temOS = modulos?.includes('ordens_servico');
        const temFin = modulos?.includes('financeiro');

        let links = `<a href="/os" class="btn-dash ${path === '/os' ? 'active' : ''}">📋 Gestão de O.S</a>`;
        if (temOS || isAdmin) links += `<a href="/os/nova" class="primary ${path === '/os/nova' ? 'active' : ''}">+ Nova O.S</a>`;
        if (temFin || temOS || isAdmin) links += `<a href="/os/financeiro" class="btn-fin ${path === '/os/financeiro' ? 'active' : ''}">💰 Financeiro</a>`;
        
        links += `<a href="/portal" class="btn-portal">🏠 Ir para o Portal</a>`;
        links += `<button class="theme-btn" onclick="toggleTheme()" id="theme-btn" style="margin-left:8px">🌙</button>`;
        links += `<a href="/logout" style="color:#ef4444; font-weight:700">Sair</a>`;
        
        nav.innerHTML = links;
        initTheme();
      } catch(e) { console.error(e); }
    }

    carregarMenu();
    carregar();
  </script>
</body>
</html>
