<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta · Suporte Técnico</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f4f3ef; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; padding: 32px; width: 380px; border: 1px solid #e2e0d8; }
    .logo { font-size: 13px; font-weight: 600; color: #1a1a18; letter-spacing: .04em; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a18; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    label { font-size: 11px; font-weight: 600; color: #888; letter-spacing: .06em; text-transform: uppercase; }
    input { font-family: inherit; font-size: 13px; padding: 10px 12px; border: 1px solid #e2e0d8; border-radius: 7px; background: #fafaf8; color: #1a1a18; outline: none; }
    input:focus { border-color: #1a1a18; }
    .btn { width: 100%; font-family: inherit; font-size: 13px; font-weight: 600; padding: 11px; border-radius: 8px; border: none; background: #1a1a18; color: #e8e6de; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #2d2d2a; }
    .link { text-align: center; margin-top: 16px; font-size: 12px; color: #888; }
    .link a { color: #1a1a18; font-weight: 500; text-decoration: none; }
    .erro { background: #fde8e8; color: #b83535; font-size: 12px; padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; border: 1px solid #f09595; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SUPORTE · TÉCNICO</div>
    <h1>Criar conta</h1>
    <p class="sub">Preencha os dados para acessar o sistema.</p>

    <div id="msg"></div>

    <form method="POST" action="/registrar">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" name="nome" placeholder="Seu nome" required/>
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.gov.br" required/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6"/>
      </div>
      <button class="btn" type="submit">Criar conta →</button>
    </form>

    <div class="link">
      Já tem conta? <a href="/">Entrar</a>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('erro')) document.getElementById('msg').innerHTML = '<div class="erro">Erro ao criar conta. Tente novamente.</div>';
  </script>
</body>
</html>
