<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações Gerais · Sistema Inovatus</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root { --bg: #f0f2f5; --surface: #fff; --border: #e5e7eb; --text: #111; --text2: #6b7280; --accent: #6366f1; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); position: fixed; height: 100vh; padding: 24px 0; }
    .nav-item { padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--text2); text-decoration: none; }
    .nav-item.active { background: #f9fafb; color: var(--accent); border-right: 3px solid var(--accent); }
    .main-content { margin-left: 260px; flex: 1; padding: 40px; }
    .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; font-size: 11px; color: var(--text2); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 14px 12px; font-size: 14px; border-bottom: 1px solid var(--border); }
    .quick-form { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 25px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 600; color: var(--text2); }
    input { padding: 10px; border-radius: 8px; border: 1px solid var(--border); outline: none; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; transition: 0.2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div style="padding: 0 24px 24px; font-weight: 600; font-size: 14px; border-bottom: 1px solid var(--border)">INOVATUS · CONFIG</div>
    <nav>
      <div class="nav-item" onclick="switchTab('usuarios', this)">👤 Usuários</div>
      <div class="nav-item active" onclick="switchTab('clientes', this)">🏢 Municípios Atendidos</div>
      <div class="nav-item" onclick="switchTab('departamentos', this)">📂 Departamentos</div>
      <div class="nav-item" onclick="switchTab('os-params', this)">⚙️ Parâmetros O.S.</div>
      <a href="/portal" class="nav-item">⬅️ Voltar ao Portal</a>
    </nav>
  </aside>

  <main class="main-content">
    <section id="tab-clientes" class="tab-content active">
      <div class="card">
        <div class="card-title">Gerenciar Municípios</div>
        <div class="quick-form">
          <div class="field" style="flex: 2;">
            <label>CIDADE / MUNICÍPIO</label>
            <input type="text" id="mun-cidade" placeholder="Ex: Sonora">
          </div>
          <div class="field" style="width: 80px;">
            <label>UF</label>
            <input type="text" id="mun-estado" value="MT" maxlength="2" style="text-align: center;">
          </div>
          <div class="field" style="width: 120px;">
            <label>DISTÂNCIA KM</label>
            <input type="number" id="mun-distancia" value="0">
          </div>
          <button class="btn btn-primary" onclick="addMunicipio()">Cadastrar Cidade</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Cidade / Município</th>
              <th>Estado</th>
              <th>Distância (Ida)</th>
              <th style="text-align:right">Ações</th>
            </tr>
          </thead>
          <tbody id="lista-municipios"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('tab-' + tabId).style.display = 'block';
      el.classList.add('active');
      carregarDados(tabId);
    }

    async function carregarDados(tab) {
      if (tab === 'clientes') {
        const res = await fetch('/api/os/municipios');
        const dados = await res.json();
        document.getElementById('lista-municipios').innerHTML = dados.map(c => `
          <tr>
            <td><div style="font-weight:600; color:var(--accent)">${c.municipio}</div></td>
            <td><div style="color:var(--text2)">${c.estado || 'MT'}</div></td>
            <td><strong>${c.distancia_km || 0}</strong> KM</td>
            <td style="text-align:right"><button class="btn-outline" onclick="removerCliente('${c.id}')">🗑️</button></td>
          </tr>
        `).join('');
      }
    }

    async function addMunicipio() {
      const cidade = document.getElementById('mun-cidade').value;
      const estado = document.getElementById('mun-estado').value.toUpperCase();
      const dist = document.getElementById('mun-distancia').value;

      if (!cidade) return alert('Por favor, informe a Cidade');

      const form = new FormData();
      // Agora enviamos o nome da cidade para ambos os campos para manter compatibilidade com o banco
      form.append('nome', cidade); 
      form.append('municipio', cidade);
      form.append('estado', estado || 'MT');
      form.append('distancia_km', dist || 0);

      const res = await fetch('/api/os/municipios', { method: 'POST', body: form });
      if (res.ok) {
        document.getElementById('mun-cidade').value = '';
        document.getElementById('mun-distancia').value = '0';
        carregarDados('clientes');
      }
    }

    async function removerCliente(id) {
      if (confirm('Deseja excluir esta cidade?')) {
        await fetch('/api/os/municipios/' + id, { method: 'DELETE' });
        carregarDados('clientes');
      }
    }

    window.onload = () => carregarDados('clientes');
  </script>
</body>
</html>
