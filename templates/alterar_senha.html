<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alterar Senha · Inovatus Sistemas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #10b981;
      --primary-hover: #059669;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    [data-theme="light"] {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --glass: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(0, 0, 0, 0.05);
      --text-main: #0f172a;
      --text-dim: #475569;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      top: -15%; right: -15%;
      width: 50%; height: 50%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.07) 0%, transparent 70%);
      z-index: 0;
    }

    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      width: 44px;
      height: 44px;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .theme-toggle:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 48px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px 18px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    [data-theme="light"] .form-group input {
      background: rgba(255, 255, 255, 0.5);
      color: #0f172a;
      border-color: rgba(0, 0, 0, 0.1);
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .hint {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      margin-left: 4px;
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-login:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -6px rgba(16, 185, 129, 0.4);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .footer-text {
      text-align: center;
      margin-top: 32px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .footer-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover { text-decoration: underline; }

    .alert {
      padding: 14px;
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 500;
      display: none;
    }

    .alert-error { 
      background: rgba(239, 68, 68, 0.1); 
      color: #f87171; 
      border: 1px solid rgba(239, 68, 68, 0.2); 
    }
    
    .alert-success { 
      background: rgba(16, 185, 129, 0.1); 
      color: #34d399; 
      border: 1px solid rgba(16, 185, 129, 0.2); 
    }

    .force-notice { 
      background: rgba(245, 158, 11, 0.1); 
      border: 1px solid rgba(245, 158, 11, 0.2); 
      color: #fbbf24; 
      border-radius: 14px; 
      padding: 14px; 
      font-size: 12px; 
      margin-bottom: 24px; 
      display: none;
      text-align: center;
      font-weight: 500;
    }

    [data-theme="light"] .force-notice {
      background: #fef3c7;
      border-color: #fcd34d;
      color: #92400e;
    }
  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Alternar tema">☀️</button>

  <div class="login-container">
    <div class="login-card">
      <h1>Alterar Senha</h1>
      <p class="subtitle">Por segurança, crie uma nova senha pessoal.</p>

      <div class="force-notice" id="force-notice">
        🔐 Este é seu primeiro acesso. Defina uma senha pessoal antes de continuar.
      </div>

      <div id="alert-erro" class="alert alert-error"></div>
      <div id="alert-sucesso" class="alert alert-success"></div>

      <div class="form-group">
        <label>Senha atual</label>
        <input type="password" id="senha-atual" placeholder="Digite sua senha atual">
      </div>

      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" id="nova-senha" placeholder="Mínimo 6 caracteres">
        <span class="hint">Mínimo de 6 caracteres.</span>
      </div>

      <div class="form-group">
        <label>Confirmar nova senha</label>
        <input type="password" id="confirmar-senha" placeholder="Repita a nova senha">
      </div>

      <button class="btn-login" id="btn-salvar" onclick="salvarSenha()">
        Salvar Nova Senha
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
      </button>

      <div class="footer-text">
        <a href="/portal">← Voltar ao portal</a>
      </div>
    </div>
  </div>

  <script>
    // Inicializar Tema Dark/Light
    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark'; 
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    initTheme();

    // Lógica original de Senha
    const params = new URLSearchParams(window.location.search);
    if (params.get('primeiro') === '1') {
      document.getElementById('force-notice').style.display = 'block';
    }

    async function salvarSenha() {
      const senhaAtual = document.getElementById('senha-atual').value;
      const novaSenha = document.getElementById('nova-senha').value;
      const confirmar = document.getElementById('confirmar-senha').value;

      document.getElementById('alert-erro').style.display = 'none';
      document.getElementById('alert-sucesso').style.display = 'none';

      if (!senhaAtual) { mostrarErro('Informe sua senha atual.'); return; }
      if (!novaSenha || novaSenha.length < 6) { mostrarErro('A nova senha deve ter no mínimo 6 caracteres.'); return; }
      if (novaSenha !== confirmar) { mostrarErro('As senhas não coincidem.'); return; }
      if (senhaAtual === novaSenha) { mostrarErro('A nova senha deve ser diferente da atual.'); return; }

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.innerHTML = 'Salvando...';

      const f = new FormData();
      f.append('senha_atual', senhaAtual);
      f.append('nova_senha', novaSenha);

      try {
        const res = await fetch('/api/minha-senha', { method: 'POST', body: f });
        if (res.ok) {
          mostrarSucesso('Senha alterada com sucesso! Redirecionando...');
          setTimeout(() => window.location.href = '/portal', 2000);
        } else {
          const data = await res.json();
          mostrarErro(data.detail || 'Senha atual incorreta. Tente novamente.');
          btn.disabled = false;
          btn.innerHTML = 'Salvar Nova Senha <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>';
        }
      } catch(e) {
        mostrarErro('Erro de conexão. Tente novamente.');
        btn.disabled = false;
        btn.innerHTML = 'Salvar Nova Senha <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>';
      }
    }

    function mostrarErro(msg) {
      const el = document.getElementById('alert-erro');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function mostrarSucesso(msg) {
      const el = document.getElementById('alert-sucesso');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') salvarSenha(); });
  </script>
</body>
</html>
