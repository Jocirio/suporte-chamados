<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações Gerais · Sistema Inovatus</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    :root {
      --bg: #f0f2f5; --surface: #fff; --surface2: #f9fafb; --border: #e5e7eb;
      --text: #111; --text2: #6b7280; --text3: #9ca3af;
      --accent: #6366f1; --accent-hover: #4f46e5;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #141720; --border: #2d3148;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
      --accent: #818cf8; --accent-hover: #6366f1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); position: fixed; height: 100vh; padding: 24px 0; z-index: 100; }
    .sidebar-brand { padding: 0 24px 24px; font-weight: 600; font-size: 14px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .nav-item { padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--text2); text-decoration: none; transition: 0.2s; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--surface2); color: var(--accent); border-right: 3px solid var(--accent); }

    .main-content { margin-left: 260px; flex: 1; padding: 40px; }
    .tab-content { display: none; animation: fadeIn .3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    
    .quick-form { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 25px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; }
    input, select { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; outline: none; }

    .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 500; transition: 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .btn-primary { background: var(--accent); color: #fff; border: none; }
    .btn-outline { background: transparent; color: var(--text2); }
    .btn-outline:hover { background: var(--surface2); }
    .btn-danger:hover { color: #dc2626; border-color: #fca5a5; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; font-size: 11px; color: var(--text3); border-bottom: 1px solid var(--border); text-transform: uppercase; }
    td { padding: 14px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }

    .role-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    .role-badge.admin { background: #ede9fe; color: #7c3aed; }
    .role-badge.colaborador { background: #f3f4f6; color: #6b7280; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.ativo { background: #059669; }
    .status-dot.inativo { background: #dc2626; }

    /* Modais */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; padding: 28px; width: 480px; max-width: 92%; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
    .modulo-opt { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">INOVATUS · CONFIG</div>
    <nav>
      <div class="nav-item active" onclick="switchTab('usuarios', this)">👤 Usuários</div>
      <div class="nav-item" onclick="switchTab('clientes', this)">🏢 Municípios Atendidos</div>
      <div class="nav-item" onclick="switchTab('departamentos', this)">📂 Departamentos</div>
      <a href="/portal" class="nav-item" style="margin-top:20px">⬅️ Voltar ao Portal</a>
    </nav>
  </aside>

  <main class="main-content">
    <section id="tab-usuarios" class="tab-content active">
      <div class="card">
        <div class="card-title">Gerenciamento de Equipe <button class="btn btn-primary" onclick="window.location='/registrar'">+ Novo Usuário</button></div>
        <input type="text" id="busca-user" placeholder="Buscar colaborador..." style="width:100%; margin-bottom:15px" oninput="filtrarUsuarios()">
        <table>
          <thead><tr><th>Colaborador</th><th>Perfil</th><th>Status</th><th style="text-align:right">Ações</th></tr></thead>
          <tbody id="lista-usuarios"></tbody>
        </table>
      </div>
    </section>

    <section id="tab-clientes" class="tab-content">
        <div class="card">
          <div class="card-title">Gerenciar Cidades</div>
          <div class="quick-form">
            <div class="field" style="flex:2"><label>Cidade</label><input type="text" id="mun-cidade"></div>
            <div class="field" style="width:70px"><label>UF</label><input type="text" id="mun-estado" value="MT" maxlength="2"></div>
            <div class="field" style="width:100px"><label>KM</label><input type="number" id="mun-distancia" value="0"></div>
            <button class="btn btn-primary" onclick="addMunicipio()">Adicionar</button>
          </div>
          <table>
            <thead><tr><th>Cidade</th><th>Estado</th><th>KM (Ida)</th><th style="text-align:right">Ações</th></tr></thead>
            <tbody id="lista-municipios"></tbody>
          </table>
        </div>
      </section>
  </main>

  <div class="modal-overlay" id="modal-perfil">
    <div class="modal">
      <div class="card-title" style="margin:0">⚙️ Configurações de Acesso</div>
      <div id="perfil-email" style="font-size:12px; color:var(--text3); margin-top:-10px"></div>
      
      <div class="field">
        <label>Tipo de Perfil</label>
        <select id="perfil-role">
            <option value="colaborador">👤 Colaborador (Acesso Padrão)</option>
            <option value="admin">👑 Admin (Gestão Total)</option>
        </select>
      </div>

      <div class="field"><label>Cargo</label><input type="text" id="perfil-cargo"></div>
      
      <div class="field">
        <label>Departamento</label>
        <select id="perfil-departamento"><option value="">Nenhum</option></select>
      </div>

      <div style="font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase;">Módulos Liberados</div>
      <div style="display:flex; flex-direction:column; gap:8px">
        <label class="modulo-opt"><input type="checkbox" id="mod-chamados"> <div><strong>Chamados</strong></div></label>
        <label class="modulo-opt"><input type="checkbox" id="mod-os"> <div><strong>Ordens de Serviço</strong></div></label>
        <label class="modulo-opt"><input type="checkbox" id="mod-financeiro"> <div><strong>Financeiro</strong></div></label>
      </div>

      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:10px">
        <button class="btn btn-outline" onclick="fecharModalPerfil()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarPerfil()">Gravar Alterações</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-senha">
    <div class="modal">
      <div class="card-title">🔑 Resetar Senha</div>
      <div class="field"><label>Nova Senha</label><input type="password" id="nova-senha"></div>
      <div class="field"><label>Confirmar Senha</label><input type="password" id="confirmar-senha"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="fecharModalSenha()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarSenha()">Atualizar Senha</button>
      </div>
    </div>
  </div>

  <script>
    let usuariosRaw = [], deps = [], currentUserId = '';

    function switchTab(t, e) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
      document.getElementById('tab-'+t).classList.add('active'); e.classList.add('active');
      carregarDados(t);
    }

    async function carregarDados(tab) {
      if (tab === 'usuarios') {
        const [uRes, dRes] = await Promise.all([fetch('/api/usuarios'), fetch('/api/os/departamentos')]);
        usuariosRaw = await uRes.json(); deps = await dRes.json();
        filtrarUsuarios();
      }
      if (tab === 'clientes') {
        const res = await fetch('/api/os/municipios');
        const dados = await res.json();
        document.getElementById('lista-municipios').innerHTML = dados.map(c => `
          <tr><td><strong>${c.municipio}</strong></td><td>${c.estado || 'MT'}</td><td>${c.distancia_km || 0} KM</td>
          <td style="text-align:right"><button class="btn btn-outline" onclick="removerCliente('${c.id}')">🗑️</button></td></tr>`).join('');
      }
    }

    function filtrarUsuarios() {
      const busca = document.getElementById('busca-user').value.toLowerCase();
      const lista = usuariosRaw.filter(u => (u.nome || '').toLowerCase().includes(busca) || (u.email || '').toLowerCase().includes(busca));
      document.getElementById('lista-usuarios').innerHTML = lista.map(u => `
        <tr>
          <td><div style="font-weight:600">${u.nome || '—'}</div><div style="font-size:11px;color:var(--text3)">${u.email}</div></td>
          <td><span class="role-badge ${u.role}">${u.role === 'admin' ? '👑 Admin' : '👤 Colaborador'}</span></td>
          <td><span class="status-dot ${u.ativo !== false ? 'ativo' : 'inativo'}"></span>${u.ativo !== false ? 'Ativo' : 'Inativo'}</td>
          <td style="text-align:right">
            <button class="btn btn-outline" onclick="abrirModalPerfil('${u.id}')" title="Configurar Acesso">⚙️ Acesso</button>
            <button class="btn btn-outline" onclick="abrirModalSenha('${u.id}')" title="Mudar Senha">🔑</button>
            <button class="btn btn-outline btn-danger" onclick="removerUsuario('${u.id}')">🗑️</button>
          </td>
        </tr>`).join('');
    }

    function abrirModalPerfil(id) {
      currentUserId = id;
      const u = usuariosRaw.find(x => x.id === id);
      document.getElementById('perfil-email').textContent = u.email;
      document.getElementById('perfil-cargo').value = u.cargo || '';
      document.getElementById('perfil-role').value = u.role || 'colaborador';
      
      const selDep = document.getElementById('perfil-departamento');
      selDep.innerHTML = '<option value="">Nenhum</option>' + deps.map(d => `<option value="${d.id}" ${u.departamento_id === d.id ? 'selected' : ''}>${d.nome}</option>`).join('');
      
      const mods = u.modulos || ['chamados'];
      document.getElementById('mod-chamados').checked = mods.includes('chamados');
      document.getElementById('mod-os').checked = mods.includes('ordens_servico');
      document.getElementById('mod-financeiro').checked = mods.includes('financeiro');
      
      document.getElementById('modal-perfil').classList.add('open');
    }

    async function salvarPerfil() {
      const modulos = [];
      if(document.getElementById('mod-chamados').checked) modulos.push('chamados');
      if(document.getElementById('mod-os').checked) modulos.push('ordens_servico');
      if(document.getElementById('mod-financeiro').checked) modulos.push('financeiro');
      
      const form = new FormData();
      form.append('cargo', document.getElementById('perfil-cargo').value);
      form.append('role', document.getElementById('perfil-role').value);
      form.append('departamento_id', document.getElementById('perfil-departamento').value);
      form.append('modulos', JSON.stringify(modulos));
      
      const res = await fetch(`/api/usuarios/${currentUserId}/perfil`, { method: 'POST', body: form });
      if(res.ok) { fecharModalPerfil(); carregarDados('usuarios'); }
    }

    function fecharModalPerfil() { document.getElementById('modal-perfil').classList.remove('open'); }
    
    function abrirModalSenha(id) { currentUserId = id; document.getElementById('modal-senha').classList.add('open'); }
    function fecharModalSenha() { document.getElementById('modal-senha').classList.remove('open'); }

    async function salvarSenha() {
        const n = document.getElementById('nova-senha').value;
        if(n !== document.getElementById('confirmar-senha').value) return alert('Senhas não coincidem');
        const f = new FormData(); f.append('nova_senha', n);
        const res = await fetch(`/api/usuarios/${currentUserId}/senha`, { method: 'POST', body: f });
        if(res.ok) { alert('Senha atualizada'); fecharModalSenha(); }
    }

    async function addMunicipio() {
      const cidade = document.getElementById('mun-cidade').value;
      const form = new FormData();
      form.append('nome', cidade); form.append('municipio', cidade);
      form.append('estado', document.getElementById('mun-estado').value);
      form.append('distancia_km', document.getElementById('mun-distancia').value);
      await fetch('/api/os/municipios', { method: 'POST', body: form });
      document.getElementById('mun-cidade').value = ''; carregarDados('clientes');
    }

    async function removerUsuario(id) {
        if(confirm('Excluir este usuário permanentemente?')) {
            await fetch('/api/usuarios/'+id, { method: 'DELETE' });
            carregarDados('usuarios');
        }
    }

    window.onload = () => carregarDados('usuarios');
  </script>
</body>
</html>
