<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes · Suporte Técnico</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root {
      --bg: #f0f2f5; --surface: #fff; --surface2: #f9fafb; --border: #e5e7eb;
      --text: #111; --text2: #6b7280; --text3: #9ca3af;
      --accent: #6366f1; --accent-hover: #4f46e5;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #141720; --border: #2d3148;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
      --accent: #818cf8; --accent-hover: #6366f1;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; transition: background .2s, border-color .2s, color .1s; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
    .logo { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .nav { display: flex; gap: 6px; align-items: center; }
    .nav a { font-size: 12px; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-weight: 500; color: var(--text2); transition: all .15s; }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: var(--surface2); color: var(--text); }
    .theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
    .theme-btn:hover { background: var(--border); }
    .content { padding: 28px 24px; max-width: 700px; margin: 0 auto; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .form-card { background: var(--surface); border-radius: 12px; padding: 22px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px; display: flex; flex-direction: column; gap: 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 500; color: var(--text2); }
    .field input { font-family: inherit; font-size: 13px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text); outline: none; }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .field input::placeholder { color: var(--text3); }
    .btn-add { font-family: inherit; background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; align-self: flex-end; transition: all .15s; }
    .btn-add:hover { background: var(--accent-hover); }
    .table-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
    .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 14px; font-weight: 600; color: var(--text); }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .05em; text-transform: uppercase; padding: 12px 18px; text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); }
    td { font-size: 13px; color: var(--text2); padding: 13px 18px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .btn-remover { font-family: inherit; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid #fca5a5; background: transparent; cursor: pointer; color: #991b1b; font-weight: 500; transition: all .15s; }
    .btn-remover:hover { background: #fee2e2; }
    .sucesso { background: #dcfce7; color: #166534; font-size: 12px; padding: 10px 12px; border-radius: 8px; border: 1px solid #86efac; display: none; }
    .empty-state { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <div class="logo-dot"></div>
      Suporte Técnico
    </div>
    <div class="nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/clientes" class="active">Clientes</a>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <a href="/logout">Sair</a>
    </div>
  </div>

  <div class="content">
    <div class="page-title">Gerenciar clientes</div>
    <div class="page-sub">Adicione ou remova os clientes disponíveis no formulário de chamados.</div>

    <div class="form-card">
      <div id="msg-sucesso" class="sucesso">Município adicionado com sucesso!</div>
      <div class="row">
        <div class="field">
          <label>Município</label>
          <input type="text" id="nome" placeholder="Ex: Nova Mutum"/>
        </div>
        <div class="field">
          <label>Estado</label>
          <input type="text" id="municipio" placeholder="Ex: MT"/>
        </div>
      </div>
      </div>
      <button class="btn-add" onclick="adicionarCliente()">Adicionar cliente →</button>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Clientes cadastrados</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Município</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </div>

  <script>
    let clientes = [];

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    async function carregar() {
      const res = await fetch('/api/clientes');
      clientes = await res.json();
      renderizar();
    }

    function renderizar() {
      const tbody = document.getElementById('lista');
      if (!clientes.length) {
        tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state">Nenhum cliente cadastrado.</div></td></tr>';
        return;
      }
      tbody.innerHTML = clientes.map(c => '<tr>' +
        '<td style="color:var(--text);font-weight:500">' + c.nome + '</td>' +
        '<td>' + c.municipio + '</td>' +
        '<td style="text-align:right"><button class="btn-remover" onclick="remover(\'' + c.id + '\')">Remover</button></td>' +
      '</tr>').join('');
    }

    async function adicionarCliente() {
      const nome = document.getElementById('nome').value.trim();
      const municipio = document.getElementById('municipio').value.trim();
      if (!nome || !municipio) { alert('Preencha os dois campos.'); return; }
      const form = new FormData();
      form.append('nome', nome);
      form.append('municipio', municipio);
      await fetch('/api/clientes', { method: 'POST', body: form });
      document.getElementById('nome').value = '';
      document.getElementById('municipio').value = '';
      const msg = document.getElementById('msg-sucesso');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
      await carregar();
    }

    async function remover(id) {
      if (!confirm('Remover este cliente?')) return;
      await fetch('/api/clientes/' + id, { method: 'DELETE' });
      await carregar();
    }

    initTheme();
    carregar();
  </script>
</body>
</html>
