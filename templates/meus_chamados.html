<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Chamados · Suporte Técnico</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root {
      --bg: #f0f2f5; --surface: #fff; --surface2: #f9fafb; --border: #e5e7eb;
      --text: #111; --text2: #6b7280; --text3: #9ca3af;
      --accent: #6366f1; --accent-hover: #4f46e5;
      --badge-open-bg: #dbeafe; --badge-open-text: #1d4ed8;
      --badge-pend-bg: #fef3c7; --badge-pend-text: #92400e;
      --badge-fix-bg: #fee2e2; --badge-fix-text: #991b1b;
      --badge-close-bg: #f3f4f6; --badge-close-text: #6b7280;
      --badge-analise-bg: #ede9fe; --badge-analise-text: #7c3aed;
      --badge-aguard-bg: #fef3c7; --badge-aguard-text: #92400e;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #141720; --border: #2d3148;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
      --accent: #818cf8; --accent-hover: #6366f1;
      --badge-open-bg: #1e3a5f; --badge-open-text: #93c5fd;
      --badge-pend-bg: #422006; --badge-pend-text: #fcd34d;
      --badge-fix-bg: #450a0a; --badge-fix-text: #fca5a5;
      --badge-close-bg: #1f2937; --badge-close-text: #9ca3af;
      --badge-analise-bg: #2e1065; --badge-analise-text: #c4b5fd;
      --badge-aguard-bg: #422006; --badge-aguard-text: #fcd34d;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; transition: background .2s, border-color .2s, color .1s; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
    .logo { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .nav { display: flex; gap: 6px; align-items: center; }
    .nav a { font-size: 12px; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-weight: 500; color: var(--text2); transition: all .15s; position: relative; }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.primary { background: var(--accent); color: #fff; }
    .nav a.primary:hover { background: var(--accent-hover); }
    .theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
    .notif-badge { position: absolute; top: -4px; right: -4px; background: #dc2626; color: #fff; font-size: 10px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
    .content { padding: 28px 24px; max-width: 1000px; margin: 0 auto; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 20px; }
    .alerta-box { border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; font-size: 13px; display: none; align-items: center; gap: 8px; }
    .alerta-box.show { display: flex; }
    .alerta-box.amarelo { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }
    .alerta-box.vermelho { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .table-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
    .table-toolbar { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); pointer-events: none; }
    .search-input { width: 100%; font-family: inherit; font-size: 13px; padding: 7px 12px 7px 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text); outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text3); }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { font-family: inherit; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--text2); font-weight: 500; transition: all .15s; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .chip:hover:not(.active) { background: var(--surface2); }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .05em; text-transform: uppercase; padding: 12px 18px; text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); }
    td { font-size: 13px; color: var(--text2); padding: 13px 18px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    tr.sla-vencido td { background: #fff7ed !important; }
    tr.sla-critico td { background: #fef2f2 !important; }
    tr.aguardando td { background: #fefce8 !important; }
    [data-theme="dark"] tr.sla-vencido td { background: #2d1f06 !important; }
    [data-theme="dark"] tr.sla-critico td { background: #2d0f0f !important; }
    [data-theme="dark"] tr.aguardando td { background: #2d2506 !important; }
    .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
    .badge.aberto { background: var(--badge-open-bg); color: var(--badge-open-text); }
    .badge.em_analise { background: var(--badge-analise-bg); color: var(--badge-analise-text); }
    .badge.aguardando_colaborador { background: var(--badge-aguard-bg); color: var(--badge-aguard-text); }
    .badge.pendente_dev { background: var(--badge-pend-bg); color: var(--badge-pend-text); }
    .badge.em_correcao { background: var(--badge-fix-bg); color: var(--badge-fix-text); }
    .badge.fechado { background: var(--badge-close-bg); color: var(--badge-close-text); }
    .sla-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; margin-left: 6px; }
    .sla-badge.vencido { background: #fee2e2; color: #991b1b; }
    .sla-badge.critico { background: #fef3c7; color: #92400e; }
    .id-col { font-family: monospace; font-size: 11px; color: var(--text3); }
    .ver-btn { font-family: inherit; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text2); font-weight: 500; transition: all .15s; }
    .ver-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .count-info { font-size: 12px; color: var(--text3); padding: 10px 18px; border-top: 1px solid var(--border); }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; padding: 28px; width: 600px; max-width: 92%; border: 1px solid var(--border); box-shadow: 0 25px 60px rgba(0,0,0,.2); display: flex; flex-direction: column; gap: 16px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text3); }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-field { display: flex; flex-direction: column; gap: 4px; }
    .modal-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
    .modal-value { font-size: 13px; color: var(--text); line-height: 1.6; }
    .divider { height: 1px; background: var(--border); }
    .resposta-box { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid #059669; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6; }
    .complemento-box { border: 1.5px solid #fcd34d; border-radius: 10px; background: #fffbeb; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    [data-theme="dark"] .complemento-box { background: #2d2506; }
    .complemento-title { font-size: 11px; font-weight: 600; color: #92400e; text-transform: uppercase; }
    .complemento-msg { font-size: 13px; color: #92400e; background: #fef3c7; border-radius: 7px; padding: 10px 12px; line-height: 1.6; }
    .complemento-textarea { font-family: inherit; font-size: 13px; padding: 10px 12px; border: 1px solid #fcd34d; border-radius: 8px; background: var(--surface); color: var(--text); outline: none; resize: none; height: 80px; width: 100%; }
    .btn-complementar { font-family: inherit; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 8px; border: none; background: #d97706; color: #fff; cursor: pointer; align-self: flex-end; }

    /* TIMELINE */
    .timeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .timeline-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
    .btn-imprimir { font-family: inherit; font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 5px; transition: all .15s; }
    .btn-imprimir:hover { background: var(--surface2); }
    .timeline { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .timeline-item { display: flex; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-item:hover { background: var(--surface2); }
    .timeline-left { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .timeline-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .timeline-dot.aberto { background: #dbeafe; }
    .timeline-dot.qualitor_vinculado { background: #ede9fe; }
    .timeline-dot.pedido_info { background: #fef3c7; }
    .timeline-dot.complementado { background: #dcfce7; }
    .timeline-dot.resposta_recebida { background: #dcfce7; }
    .timeline-dot.fechado { background: #f3f4f6; }
    .timeline-connector { width: 2px; flex: 1; background: var(--border); min-height: 8px; }
    .timeline-item:last-child .timeline-connector { display: none; }
    .timeline-content { flex: 1; padding-top: 4px; }
    .timeline-evento { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .timeline-desc { font-size: 12px; color: var(--text2); line-height: 1.6; background: var(--surface2); border-radius: 6px; padding: 8px 10px; margin-top: 6px; border-left: 3px solid var(--border); }
    .timeline-meta { font-size: 11px; color: var(--text3); margin-top: 5px; display: flex; align-items: center; gap: 6px; }
    .timeline-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-resolver { font-family: inherit; font-size: 12px; font-weight: 500; padding: 9px 18px; border-radius: 8px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); cursor: pointer; }
    .btn-cancelar { font-family: inherit; font-size: 12px; font-weight: 500; padding: 9px 18px; border-radius: 8px; background: transparent; color: var(--text3); border: 1px solid var(--border); cursor: pointer; }
    .empty-state { text-align: center; padding: 56px; color: var(--text3); font-size: 13px; }

    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: fixed; top: 0; left: 0; width: 100%; padding: 24px; font-family: Arial, sans-serif; }
      .print-header { margin-bottom: 20px; border-bottom: 2px solid #111; padding-bottom: 12px; }
      .print-title { font-size: 18px; font-weight: 700; color: #111; }
      .print-sub { font-size: 12px; color: #666; margin-top: 4px; }
      .print-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
      .print-info-item label { font-size: 10px; color: #888; text-transform: uppercase; display: block; }
      .print-info-item span { font-size: 13px; color: #111; font-weight: 500; }
      .print-timeline { border: 1px solid #ccc; border-radius: 6px; overflow: hidden; }
      .print-timeline-item { padding: 12px 14px; border-bottom: 1px solid #eee; display: flex; gap: 12px; }
      .print-timeline-item:last-child { border-bottom: none; }
      .print-dot { width: 10px; height: 10px; border-radius: 50%; background: #6366f1; margin-top: 4px; flex-shrink: 0; }
      .print-evento { font-size: 13px; font-weight: 600; color: #111; }
      .print-desc { font-size: 12px; color: #444; margin-top: 3px; line-height: 1.5; }
      .print-meta { font-size: 11px; color: #888; margin-top: 3px; }
    }
  </style>
</head>
<body>
  <!-- ÁREA DE IMPRESSÃO -->
  <div id="print-area" style="display:none">
    <div class="print-header">
      <div class="print-title">Histórico do Chamado · <span id="p-id"></span></div>
      <div class="print-sub">Gerado em <span id="p-data"></span></div>
    </div>
    <div class="print-info">
      <div class="print-info-item"><label>Unidade</label><span id="p-unidade"></span></div>
      <div class="print-info-item"><label>Status</label><span id="p-status"></span></div>
      <div class="print-info-item"><label>ID Qualitor</label><span id="p-qualitor"></span></div>
      <div class="print-info-item"><label>Aberto em</label><span id="p-abertura"></span></div>
    </div>
    <div class="print-timeline" id="p-timeline"></div>
  </div>

  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Suporte Técnico</div>
    <div class="nav">
      <a href="/novo-chamado" class="primary">+ Novo chamado</a>
      <a href="/meus-chamados" style="position:relative">
        Meus chamados
        <span class="notif-badge" id="notif-badge" style="display:none"></span>
      </a>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <a href="/logout">Sair</a>
    </div>
  </div>

  <div class="content">
    <div class="page-title">Meus chamados</div>
    <div class="alerta-box amarelo" id="alerta-aguardando">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alerta-aguardando-texto"></span>
    </div>
    <div class="alerta-box vermelho" id="alerta-sla">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alerta-sla-texto"></span>
    </div>
    <div class="table-card">
      <div class="table-toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" id="busca" placeholder="Buscar por descrição, unidade ou ID..." oninput="aplicarFiltros()"/>
        </div>
        <div class="filter-row">
          <button class="chip active" onclick="setStatus('todos', this)">Todos</button>
          <button class="chip" onclick="setStatus('aberto', this)">Abertos</button>
          <button class="chip" onclick="setStatus('aguardando_colaborador', this)">Aguardando</button>
          <button class="chip" onclick="setStatus('pendente_dev', this)">Pendente</button>
          <button class="chip" onclick="setStatus('fechado', this)">Fechados</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Unidade</th>
            <th>Descrição</th>
            <th>Status</th>
            <th>Data</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
      <div class="count-info" id="count-info"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Detalhe do chamado</div>
        <button class="modal-close" onclick="fecharModal()">×</button>
      </div>
      <div class="modal-grid">
        <div class="modal-field"><div class="modal-label">ID</div><div class="modal-value" id="m-id"></div></div>
        <div class="modal-field"><div class="modal-label">Status</div><div class="modal-value" id="m-status"></div></div>
        <div class="modal-field"><div class="modal-label">Unidade</div><div class="modal-value" id="m-unidade"></div></div>
        <div class="modal-field"><div class="modal-label">ID Qualitor</div><div class="modal-value" id="m-qualitor"></div></div>
      </div>
      <div class="modal-field"><div class="modal-label">Descrição enviada</div><div class="modal-value" id="m-desc"></div></div>
      <div class="divider"></div>
      <div class="modal-field">
        <div class="modal-label">Resposta do parceiro</div>
        <div class="modal-value" id="m-resposta"></div>
      </div>
      <div id="complemento-wrap" style="display:none">
        <div class="divider"></div>
        <div class="complemento-box">
          <div class="complemento-title">⚠️ Informações solicitadas pelo suporte</div>
          <div class="complemento-msg" id="complemento-msg"></div>
          <textarea class="complemento-textarea" id="complemento-input" placeholder="Digite aqui as informações solicitadas..."></textarea>
          <button class="btn-complementar" onclick="complementar()">Enviar complemento →</button>
        </div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="timeline-header">
          <div class="timeline-title">Linha do tempo</div>
          <button class="btn-imprimir" onclick="imprimirHistorico()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Imprimir histórico
          </button>
        </div>
        <div class="timeline" id="timeline"><div style="padding:16px;color:var(--text3);font-size:12px">Carregando...</div></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancelar" onclick="fecharModal()">Fechar</button>
        <button class="btn-resolver" id="btn-resolver" onclick="resolverChamado()">Marcar como resolvido</button>
      </div>
    </div>
  </div>

  <script>
    let chamados = [];
    let statusFiltro = 'todos';
    let chamadoAtualId = '';
    let historicoAtual = [];
    let chamadoAtual = null;

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    function badge(status) {
      const labels = { aberto: 'Aberto', em_analise: 'Em análise', aguardando_colaborador: 'Aguardando sua resposta', pendente_dev: 'Pendente dev', em_correcao: 'Em correção', fechado: 'Fechado' };
      return '<span class="badge ' + status + '">' + (labels[status] || status) + '</span>';
    }
    function badgeTexto(status) {
      const labels = { aberto: 'Aberto', em_analise: 'Em análise', aguardando_colaborador: 'Aguardando sua resposta', pendente_dev: 'Pendente dev', em_correcao: 'Em correção', fechado: 'Fechado' };
      return labels[status] || status;
    }
    function horasDesde(d) { return (new Date() - new Date(d)) / (1000 * 60 * 60); }
    function slaBadge(c) {
      if (c.status === 'fechado') return '';
      const horas = horasDesde(c.ultima_interacao || c.created_at);
      const sla = c.sla_horas || 48;
      if (horas > sla) return '<span class="sla-badge vencido">SLA vencido</span>';
      if (horas > sla * 0.75) return '<span class="sla-badge critico">SLA crítico</span>';
      return '';
    }
    function slaCls(c) {
      if (c.status === 'aguardando_colaborador') return 'aguardando';
      if (c.status === 'fechado') return '';
      const horas = horasDesde(c.ultima_interacao || c.created_at);
      const sla = c.sla_horas || 48;
      if (horas > sla) return 'sla-critico';
      if (horas > sla * 0.75) return 'sla-vencido';
      return '';
    }
    function data(d) { return new Date(d).toLocaleDateString('pt-BR'); }
    function dataHora(d) { return new Date(d).toLocaleString('pt-BR'); }
    function eventoLabel(e) {
      const labels = { aberto: '🟢 Chamado aberto', qualitor_vinculado: '🔗 Qualitor vinculado', pedido_info: '🟡 Informações solicitadas', complementado: '📝 Complemento enviado', resposta_recebida: '✅ Resposta do parceiro', fechado: '🔒 Chamado fechado' };
      return labels[e] || e;
    }
    function eventoEmoji(e) {
      const m = { aberto: '🟢', qualitor_vinculado: '🔗', pedido_info: '🟡', complementado: '📝', resposta_recebida: '✅', fechado: '🔒' };
      return m[e] || '•';
    }

    function setStatus(s, el) {
      statusFiltro = s;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      aplicarFiltros();
    }

    function aplicarFiltros() {
      const busca = document.getElementById('busca').value.toLowerCase();
      let lista = chamados.filter(function(c) {
        const matchStatus = statusFiltro === 'todos' || c.status === statusFiltro;
        const matchBusca = !busca ||
          c.id.toLowerCase().includes(busca) ||
          (c.unidade || '').toLowerCase().includes(busca) ||
          (c.cliente_nome || '').toLowerCase().includes(busca) ||
          (c.descricao_tecnica || '').toLowerCase().includes(busca);
        return matchStatus && matchBusca;
      });

      const pendentes = chamados.filter(function(c) { return c.status === 'pendente_dev'; }).length;
      const aguardando = chamados.filter(function(c) { return c.status === 'aguardando_colaborador'; }).length;
      const nb = document.getElementById('notif-badge');
      const total = pendentes + aguardando;
      if (total > 0) { nb.textContent = total; nb.style.display = 'flex'; }
      else nb.style.display = 'none';

      const alertaAg = document.getElementById('alerta-aguardando');
      if (aguardando > 0) {
        document.getElementById('alerta-aguardando-texto').textContent = aguardando + ' chamado' + (aguardando !== 1 ? 's' : '') + ' aguardando seu complemento — clique em Ver para responder.';
        alertaAg.classList.add('show');
      } else alertaAg.classList.remove('show');

      const vencidos = chamados.filter(function(c) { return c.status !== 'fechado' && horasDesde(c.ultima_interacao || c.created_at) > (c.sla_horas || 48); }).length;
      const alertaSla = document.getElementById('alerta-sla');
      if (vencidos > 0) {
        document.getElementById('alerta-sla-texto').textContent = vencidos + ' chamado' + (vencidos !== 1 ? 's' : '') + ' com SLA vencido.';
        alertaSla.classList.add('show');
      } else alertaSla.classList.remove('show');

      document.getElementById('count-info').textContent = lista.length + ' chamado' + (lista.length !== 1 ? 's' : '') + ' encontrado' + (lista.length !== 1 ? 's' : '');
      const tbody = document.getElementById('lista');
      if (!lista.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">Nenhum chamado encontrado.</div></td></tr>';
        return;
      }
      tbody.innerHTML = lista.map(function(c) {
        return '<tr class="' + slaCls(c) + '">' +
          '<td class="id-col">' + c.id.substring(0,8).toUpperCase() + '</td>' +
          '<td style="color:var(--text)">' + (c.unidade || c.cliente_nome) + '</td>' +
          '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + c.descricao_tecnica + '</td>' +
          '<td>' + badge(c.status) + slaBadge(c) + '</td>' +
          '<td>' + data(c.created_at) + '</td>' +
          '<td><button class="ver-btn" onclick="abrirModal(\'' + c.id + '\')">Ver</button></td>' +
        '</tr>';
      }).join('');
    }

    async function abrirModal(id) {
      const c = chamados.find(function(x) { return x.id === id; });
      chamadoAtualId = id;
      chamadoAtual = c;
      document.getElementById('m-id').textContent = c.id.substring(0,8).toUpperCase();
      document.getElementById('m-status').innerHTML = badge(c.status) + slaBadge(c);
      document.getElementById('m-unidade').textContent = c.unidade || c.cliente_nome;
      document.getElementById('m-qualitor').textContent = c.qualitor_id || '— aguardando';
      document.getElementById('m-desc').textContent = c.descricao_tecnica;
      document.getElementById('m-resposta').innerHTML = c.resposta_parceiro
        ? '<div class="resposta-box">' + c.resposta_parceiro + '</div>'
        : '<span style="color:var(--text3)">— aguardando resposta do parceiro</span>';
      document.getElementById('btn-resolver').style.display = c.status === 'fechado' ? 'none' : 'inline-block';
      document.getElementById('complemento-input').value = '';

      if (c.status === 'aguardando_colaborador') {
        document.getElementById('complemento-wrap').style.display = 'block';
        try {
          const res = await fetch('/api/chamados/' + id + '/mensagens');
          const msgs = await res.json();
          const pedido = msgs.filter(function(m) { return m.tipo === 'pedido_info'; }).pop();
          document.getElementById('complemento-msg').textContent = pedido ? pedido.mensagem : 'Informações adicionais necessárias.';
        } catch(e) {
          document.getElementById('complemento-msg').textContent = 'Informações adicionais necessárias.';
        }
      } else {
        document.getElementById('complemento-wrap').style.display = 'none';
      }

      document.getElementById('modal').classList.add('open');
      await carregarTimeline(id);
    }

    async function carregarTimeline(id) {
      const tl = document.getElementById('timeline');
      tl.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px">Carregando...</div>';
      try {
        const res = await fetch('/api/chamados/' + id + '/historico');
        historicoAtual = await res.json();
        if (!historicoAtual.length) {
          tl.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px">Nenhum evento registrado.</div>';
          return;
        }
        tl.innerHTML = historicoAtual.map(function(h, i) {
          return '<div class="timeline-item">' +
            '<div class="timeline-left">' +
              '<div class="timeline-dot ' + h.evento + '">' + eventoEmoji(h.evento) + '</div>' +
              (i < historicoAtual.length - 1 ? '<div class="timeline-connector"></div>' : '') +
            '</div>' +
            '<div class="timeline-content">' +
              '<div class="timeline-evento">' + eventoLabel(h.evento) + '</div>' +
              (h.descricao ? '<div class="timeline-desc">' + h.descricao + '</div>' : '') +
              '<div class="timeline-meta">' +
                '<span>' + dataHora(h.created_at) + '</span>' +
                '<div class="timeline-meta-dot"></div>' +
                '<span>' + (h.autor || '') + '</span>' +
              '</div>' +
            '</div>' +
          '</div>';
        }).join('');
      } catch(e) {
        tl.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px">Erro ao carregar histórico.</div>';
      }
    }

    function imprimirHistorico() {
      if (!chamadoAtual) return;
      document.getElementById('p-id').textContent = chamadoAtual.id.substring(0,8).toUpperCase();
      document.getElementById('p-data').textContent = new Date().toLocaleString('pt-BR');
      document.getElementById('p-unidade').textContent = chamadoAtual.unidade || chamadoAtual.cliente_nome;
      document.getElementById('p-status').textContent = badgeTexto(chamadoAtual.status);
      document.getElementById('p-qualitor').textContent = chamadoAtual.qualitor_id || '—';
      document.getElementById('p-abertura').textContent = dataHora(chamadoAtual.created_at);
      document.getElementById('p-timeline').innerHTML = historicoAtual.map(function(h) {
        return '<div class="print-timeline-item">' +
          '<div class="print-dot"></div>' +
          '<div>' +
            '<div class="print-evento">' + eventoLabel(h.evento) + '</div>' +
            (h.descricao ? '<div class="print-desc">' + h.descricao + '</div>' : '') +
            '<div class="print-meta">' + dataHora(h.created_at) + ' · ' + (h.autor || '') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
      document.getElementById('print-area').style.display = 'block';
      window.print();
      document.getElementById('print-area').style.display = 'none';
    }

    function fecharModal() { document.getElementById('modal').classList.remove('open'); }
    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) fecharModal(); });

    async function complementar() {
      const msg = document.getElementById('complemento-input').value.trim();
      if (!msg) { alert('Digite as informações solicitadas.'); return; }
      const form = new FormData();
      form.append('mensagem', msg);
      await fetch('/chamado/' + chamadoAtualId + '/complementar', { method: 'POST', body: form });
      await carregar();
      fecharModal();
    }

    async function resolverChamado() {
      if (!confirm('Marcar como resolvido?')) return;
      await fetch('/chamado/' + chamadoAtualId + '/fechar', { method: 'POST' });
      await carregar();
      fecharModal();
    }

    async function carregar() {
      try {
        const res = await fetch('/api/meus-chamados');
        if (res.status === 401) { window.location = '/'; return; }
        chamados = await res.json();
        aplicarFiltros();
      } catch(e) {
        document.getElementById('lista').innerHTML = '<tr><td colspan="6"><div class="empty-state">Erro: ' + e.message + '</div></td></tr>';
      }
    }

    initTheme();
    carregar();
  </script>
</body>
</html>
