<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de O.S · Inovatus Sistemas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --bg: #f0f2f5; --surface: #fff; --surface2: #f9fafb; --border: #e5e7eb;
      --text: #111; --text2: #6b7280; --text3: #9ca3af;
      --accent: #6366f1; --accent-hover: #4f46e5;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #141720; --border: #2d3148;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
      --accent: #818cf8; --accent-hover: #6366f1;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; transition: background .2s, border-color .2s, color .1s; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
    
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 65px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
    .logo { font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; }
    
    .nav { display: flex; gap: 8px; align-items: center; }
    .nav a { font-size: 12px; padding: 8px 16px; border-radius: 10px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
    
    /* Botões Coloridos */
    .nav a.btn-dash { border: 1px solid #6366f1; color: #6366f1; }
    .nav a.btn-dash.active { background: #6366f1; color: #fff; }

    .nav a.btn-fin { border: 1px solid #f59e0b; color: #f59e0b; }
    .nav a.btn-fin.active { background: #f59e0b; color: #fff; }

    .nav a.primary { background: #10b981; color: #fff; border: 1px solid #10b981; }
    .nav a.primary:hover { background: #059669; }

    .nav a.btn-portal { 
        background: var(--surface2); 
        border: 1px solid var(--text); 
        color: var(--text);
        margin-left: 10px;
        font-weight: 800;
    }
    .nav a.btn-portal:hover { background: var(--text); color: var(--surface); }

    .theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; margin-left: 5px; }
    
    .content { padding: 28px 24px; max-width: 1200px; margin: 0 auto; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
    
    .stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 24px; }
    .stat { background: var(--surface); border-radius: 12px; padding: 18px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .stat-val { font-size: 24px; font-weight: 600; color: var(--text); }
    .stat-val.green { color: #059669; }
    .stat-val.amber { color: #d97706; }
    .stat-val.blue { color: #6366f1; }
    
    .table-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
    .table-toolbar { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 250px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); }
    .search-input { width: 100%; font-size: 13px; padding: 8px 12px 8px 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text); outline: none; }
    
    .chip { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--text2); font-weight: 500; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; padding: 12px 18px; text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); }
    td { font-size: 13px; color: var(--text2); padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .badge.emitida { background: #dbeafe; color: #1d4ed8; }
    .badge.aprovada { background: #dcfce7; color: #166534; }
    .badge.encerrada { background: #f3f4f6; color: #6b7280; }
    
    .ver-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text); font-weight: 600; font-size: 11px; }
    .ver-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Estilo do Botão WhatsApp */
    .btn-wpp-sm { background: #22c55e; color: white; border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; }
    .btn-wpp-sm:hover { background: #16a34a; }

    /* Modal Styles */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; width: 700px; max-width: 95%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--border); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .info-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; }
    .info-value { font-size: 14px; font-weight: 500; color: var(--text); }
    .total-box { background: #f0fdf4; border: 1px solid #86efac; padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .btn-aprovar { background: #059669; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-wpp-modal { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Gestão Global O.S</div>
    <div class="nav" id="nav-menu"></div>
  </div>

  <div class="content">
    <div class="page-title">Controle Global de Ordens</div>
    
    <div class="stats">
      <div class="stat"><div class="stat-label">Total Geral</div><div class="stat-val" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">Pendentes</div><div class="stat-val blue" id="s-emitidas">0</div></div>
      <div class="stat"><div class="stat-label">Aprovadas</div><div class="stat-val green" id="s-aprovadas">0</div></div>
      <div class="stat"><div class="stat-label">Em Prestação</div><div class="stat-val amber" id="s-prestacao">0</div></div>
      <div class="stat"><div class="stat-label">Encerradas</div><div class="stat-val" id="s-encerradas">0</div></div>
    </div>

    <div class="table-card">
      <div class="table-toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" id="busca" placeholder="Filtrar por número, técnico ou cidade..." oninput="filtrar()"/>
        </div>
        <button class="chip active" onclick="setFiltro('todos', this)">Todas</button>
        <button class="chip" onclick="setFiltro('emitida', this)">Pendentes</button>
        <button class="chip" onclick="setFiltro('aprovada', this)">Aprovadas</button>
        <button class="chip" onclick="setFiltro('prestacao_enviada', this)">Em Prestação</button>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>Nº O.S</th>
            <th>Colaborador</th>
            <th>Município</th>
            <th>Saída</th>
            <th>Total Bruto</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
      <div id="count-info" style="padding: 15px; font-size: 12px; color: var(--text3); border-top: 1px solid var(--border);"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" style="font-weight: 700;">Detalhes da Ordem #<span id="m-numero"></span></div>
        <button style="background:none; border:none; font-size: 24px; cursor:pointer; color: var(--text3);" onclick="fecharModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="info-grid">
          <div><div class="info-label">Técnico</div><div class="info-value" id="m-colaborador"></div></div>
          <div><div class="info-label">Município</div><div class="info-value" id="m-municipio"></div></div>
          <div><div class="info-label">Saída</div><div class="info-value" id="m-ida"></div></div>
          <div><div class="info-label">Retorno</div><div class="info-value" id="m-volta"></div></div>
        </div>
        <div style="height: 1px; background: var(--border);"></div>
        <div><div class="info-label">Serviços</div><div id="m-servicos" style="font-size: 13px; margin-top:5px; line-height:1.5;"></div></div>
        <div class="total-box">
          <span style="font-weight: 700; color: #166534;">VALOR TOTAL:</span>
          <span id="m-total" style="font-family: monospace; font-size: 18px; font-weight: 800; color: #059669;"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-wpp-modal" onclick="enviarOSWhatsApp(osAtualId)">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.433 5.63 1.435h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </button>
        <button class="btn-aprovar" id="btn-aprovar" onclick="aprovarOS()">✅ Aprovar Viagem</button>
        <button class="ver-btn" onclick="fecharModal()">Fechar</button>
        <a id="btn-pdf" href="#" target="_blank" class="ver-btn" style="background: #10b981; color: white; border:none; text-decoration: none;">📄 PDF</a>
      </div>
    </div>
  </div>

  <script>
    let ordens = [], filtroStatus = 'todos', osAtualId = '';

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const c = document.documentElement.getAttribute('data-theme');
      const n = c === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
      document.getElementById('theme-btn').textContent = n === 'dark' ? '☀️' : '🌙';
    }

    function fmt(v) { return 'R$ ' + parseFloat(v || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2}); }
    function fmtData(d) { if (!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR'); }

    async function enviarOSWhatsApp(osId) {
      try {
        const response = await fetch(`/api/os/ordens/${osId}`);
        const o = await response.json();
        
        const mensagem = `*📋 NOVA ORDEM DE SERVIÇO - INOVATUS*%0A%0A` +
            `*Número:* ${o.numero}%0A` +
            `*Colaborador:* ${o.colaborador_nome}%0A` +
            `*Destino:* ${o.clientes?.nome || '—'}%0A` +
            `*Período:* ${fmtData(o.data_ida)} até ${fmtData(o.data_volta)}%0A` +
            `*Serviços:* ${o.servicos}%0A%0A` +
            `👉 *Visualizar no Portal:* https://voosuporte.com.br/colaborador/os`;

        const telefone = o.perfis?.telefone || ""; 
        const url = `https://wa.me/55${telefone.replace(/\D/g, '')}?text=${mensagem}`;
        window.open(url, '_blank');
      } catch (error) {
        alert("Erro ao preparar mensagem. Verifique o cadastro do colaborador.");
      }
    }

    async function carregarMenu() {
      const nav = document.getElementById('nav-menu');
      try {
        const res = await fetch('/api/meu-email', { credentials: 'include' });
        const data = await res.json();
        const role = data.role || '';
        const path = window.location.pathname;

        let links = `<a href="/os" class="btn-dash ${path === '/os' ? 'active' : ''}">📋 Gestão de O.S</a>`;
        links += `<a href="/os/nova" class="primary">+ Nova O.S</a>`;
        links += `<a href="/os/financeiro" class="btn-fin ${path === '/os/financeiro' ? 'active' : ''}">💰 Financeiro</a>`;
        links += '<a href="/portal" class="btn-portal">🏠 Portal</a>';
        links += '<button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>';
        links += '<a href="/logout" style="color:#ef4444; font-weight:700; margin-left:5px;">Sair</a>';
        
        nav.innerHTML = links;
      } catch(e) {
        nav.innerHTML = `<a href="/os" class="btn-dash active">📋 Gestão de O.S</a><a href="/os/financeiro" class="btn-fin">💰 Financeiro</a><a href="/portal" class="btn-portal">🏠 Portal</a><a href="/logout" style="color:#ef4444; font-weight:700; margin-left:5px;">Sair</a>`;
      }
      initTheme();
    }

    function setFiltro(s, el) {
      filtroStatus = s;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      filtrar();
    }

    function filtrar() {
      const busca = document.getElementById('busca').value.toLowerCase();
      let lista = ordens.filter(o => {
        const mS = filtroStatus === 'todos' || o.status === filtroStatus;
        const mB = !busca || o.numero.toLowerCase().includes(busca) || o.colaborador_nome.toLowerCase().includes(busca) || (o.clientes?.nome||'').toLowerCase().includes(busca);
        return mS && mB;
      });
      renderizar(lista);
    }

    function renderizar(lista) {
      document.getElementById('count-info').textContent = `${lista.length} registro(s) exibido(s)`;
      const tbody = document.getElementById('lista');
      tbody.innerHTML = lista.map(o => `
        <tr>
          <td style="font-weight:700; color:var(--accent)">${o.numero}</td>
          <td style="color:var(--text); font-weight:500;">${o.colaborador_nome}</td>
          <td>${o.clientes?.nome || '—'}</td>
          <td>${fmtData(o.data_ida)}</td>
          <td style="font-family:monospace; font-weight:600;">${fmt(o.valor_total)}</td>
          <td><span class="badge ${o.status}">${o.status.replace('_', ' ')}</span></td>
          <td>
            <div style="display:flex; gap:6px; align-items:center;">
              <button class="ver-btn" onclick="abrirModal('${o.id}')">Detalhes</button>
              <button class="btn-wpp-sm" onclick="enviarOSWhatsApp('${o.id}')" title="WhatsApp">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.433 5.63 1.435h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              </button>
            </div>
          </td>
        </tr>`).join('');
    }

    async function abrirModal(id) {
      osAtualId = id;
      const res = await fetch('/api/os/ordens/' + id);
      const o = await res.json();
      document.getElementById('m-numero').textContent = o.numero;
      document.getElementById('m-colaborador').textContent = o.colaborador_nome;
      document.getElementById('m-municipio').textContent = o.clientes?.nome || '—';
      document.getElementById('m-ida').textContent = fmtData(o.data_ida) + ' ' + o.hora_ida;
      document.getElementById('m-volta').textContent = fmtData(o.data_volta) + ' ' + o.hora_volta;
      document.getElementById('m-servicos').textContent = o.servicos;
      document.getElementById('m-total').textContent = fmt(o.valor_total);
      document.getElementById('btn-aprovar').style.display = o.status === 'emitida' ? 'block' : 'none';
      document.getElementById('btn-pdf').href = `/os/ordens/${id}/pdf`;
      document.getElementById('modal').classList.add('open');
    }

    async function carregar() {
      const res = await fetch('/api/os/ordens');
      ordens = await res.json();
      document.getElementById('s-total').textContent = ordens.length;
      document.getElementById('s-emitidas').textContent = ordens.filter(o => o.status === 'emitida').length;
      document.getElementById('s-aprovadas').textContent = ordens.filter(o => o.status === 'aprovada').length;
      document.getElementById('s-prestacao').textContent = ordens.filter(o => o.status === 'prestacao_enviada').length;
      document.getElementById('s-encerradas').textContent = ordens.filter(o => o.status === 'encerrada').length;
      filtrar();
    }

    async function aprovarOS() {
      if(!confirm('Deseja aprovar esta viagem?')) return;
      await fetch(`/api/os/ordens/${osAtualId}/aprovar`, {method:'POST'});
      fecharModal(); carregar();
    }

    function fecharModal() { document.getElementById('modal').classList.remove('open'); }

    carregarMenu();
    carregar();
  </script>
</body>
</html>
