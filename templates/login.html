<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Inovatus Sistemas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #10b981;
      --primary-hover: #059669;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    [data-theme="light"] {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --glass: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(0, 0, 0, 0.05);
      --text-main: #0f172a;
      --text-dim: #475569;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Brilho decorativo no fundo */
    body::before {
      content: "";
      position: absolute;
      top: -15%; right: -15%;
      width: 50%; height: 50%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.07) 0%, transparent 70%);
      z-index: 0;
    }

    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      width: 44px;
      height: 44px;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .theme-toggle:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 48px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-dot {
      width: 14px;
      height: 14px;
      border-radius: 5px;
      background: var(--primary);
      box-shadow: 0 0 20px var(--primary);
    }

    .brand-name {
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
    }

    [data-theme="light"] .brand-name { color: var(--text-main); }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px 18px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    [data-theme="light"] .form-group input {
      background: rgba(255, 255, 255, 0.5);
      color: #0f172a;
      border-color: rgba(0, 0, 0, 0.1);
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-login:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -6px rgba(16, 185, 129, 0.4);
    }

    .footer-text {
      text-align: center;
      margin-top: 32px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .footer-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover { text-decoration: underline; }

    /* Estilo das mensagens de erro/sucesso */
    .alert {
      padding: 14px;
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 500;
    }

    .alert-error { 
      background: rgba(239, 68, 68, 0.1); 
      color: #f87171; 
      border: 1px solid rgba(239, 68, 68, 0.2); 
    }
    
    .alert-success { 
      background: rgba(16, 185, 129, 0.1); 
      color: #34d399; 
      border: 1px solid rgba(16, 185, 129, 0.2); 
    }

  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Alternar tema">☀️</button>

  <div class="login-container">
    <div class="login-card">
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-name">Inovatus Sistemas</div>
      </div>

      <h1>Bem-vindo</h1>
      <p class="subtitle">Insira as suas credenciais para aceder.</p>

      <div id="msg"></div>

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Endereço de E-mail</label>
          <input type="email" name="email" placeholder="email@inovatus.com.br" required>
        </div>

        <div class="form-group">
          <label>Palavra-passe</label>
          <input type="password" name="senha" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">
          Entrar na Plataforma
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
        </button>
      </form>

      <div class="footer-text">
        Ainda não tem conta? <a href="/registrar">Solicitar acesso</a>
      </div>
    </div>
  </div>

  <script>
    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark'; 
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    // Processamento de alertas da URL (Erro de login ou Sucesso de cadastro)
    const urlParams = new URLSearchParams(window.location.search);
    const msgDiv = document.getElementById('msg');
    
    if (urlParams.get('erro')) {
      msgDiv.innerHTML = '<div class="alert alert-error">E-mail ou senha incorretos. Verifique e tente novamente.</div>';
    }
    
    if (urlParams.get('cadastro')) {
      msgDiv.innerHTML = '<div class="alert alert-success">Conta criada! Aguarde a aprovação ou faça login.</div>';
    }

    initTheme();
  </script>
</body>
</html>
