<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes · Suporte Técnico</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f4f3ef; min-height: 100vh; }
    .topbar { background: #1a1a18; padding: 0 24px; height: 48px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 13px; font-weight: 600; color: #e8e6de; letter-spacing: .04em; }
    .nav { display: flex; gap: 8px; }
    .nav a { font-size: 12px; padding: 5px 14px; border-radius: 6px; text-decoration: none; font-weight: 500; color: #888; border: 1px solid #333; }
    .nav a:hover { background: #2a2a28; color: #e8e6de; }
    .nav a.active { background: #e8e6de; color: #1a1a18; border-color: #e8e6de; }
    .content { padding: 24px; max-width: 700px; margin: 0 auto; }
    h1 { font-size: 18px; font-weight: 600; color: #1a1a18; margin: 20px 0 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 20px; }
    .form-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e2e0d8; display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 11px; font-weight: 600; color: #888; letter-spacing: .06em; text-transform: uppercase; }
    input { font-family: inherit; font-size: 13px; padding: 9px 12px; border: 1px solid #e2e0d8; border-radius: 7px; background: #fafaf8; color: #1a1a18; outline: none; }
    input:focus { border-color: #1a1a18; }
    .btn-add { font-family: inherit; background: #1a1a18; color: #e8e6de; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; align-self: flex-end; }
    .btn-add:hover { background: #2d2d2a; }
    .table-card { background: #fff; border-radius: 10px; border: 1px solid #e2e0d8; overflow: hidden; }
    .table-header { padding: 14px 18px; border-bottom: 1px solid #f0ede6; }
    .table-title { font-size: 13px; font-weight: 600; color: #1a1a18; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: .05em; text-transform: uppercase; padding: 10px 18px; text-align: left; background: #fafaf8; border-bottom: 1px solid #f0ede6; }
    td { font-size: 13px; color: #3a3a36; padding: 12px 18px; border-bottom: 1px solid #f7f5f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }
    .btn-remover { font-family: inherit; font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid #f09595; background: transparent; cursor: pointer; color: #b83535; font-weight: 500; }
    .btn-remover:hover { background: #fde8e8; }
    .sucesso { background: #e8f5ee; color: #2d7a52; font-size: 12px; padding: 10px 12px; border-radius: 7px; border: 1px solid #a8dfc3; display: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">SUPORTE · TÉCNICO</div>
    <div class="nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/clientes" class="active">Clientes</a>
      <a href="/logout">Sair</a>
    </div>
  </div>

  <div class="content">
    <h1>Gerenciar clientes</h1>
    <p class="sub">Adicione ou remova os clientes disponíveis no formulário de chamados.</p>

    <div class="form-card">
      <div id="msg-sucesso" class="sucesso">Cliente adicionado com sucesso!</div>
      <div class="row">
        <div class="field">
          <label>Nome da unidade</label>
          <input type="text" id="nome" placeholder="Ex: ESF — Nova Mutum"/>
        </div>
        <div class="field">
          <label>Município</label>
          <input type="text" id="municipio" placeholder="Ex: Nova Mutum"/>
        </div>
      </div>
      <button class="btn-add" onclick="adicionarCliente()">Adicionar cliente →</button>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Clientes cadastrados</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Unidade</th>
            <th>Município</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </div>

  <script>
    let clientes = [];

    async function carregar() {
      const res = await fetch('/api/clientes');
      clientes = await res.json();
      renderizar();
    }

    function renderizar() {
      const tbody = document.getElementById('lista');
      if (!clientes.length) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:30px;color:#aaa;font-size:13px">Nenhum cliente cadastrado.</td></tr>';
        return;
      }
      tbody.innerHTML = clientes.map(c => `
        <tr>
          <td>${c.nome}</td>
          <td style="color:#888">${c.municipio}</td>
          <td style="text-align:right"><button class="btn-remover" onclick="remover('${c.id}')">Remover</button></td>
        </tr>
      `).join('');
    }

    async function adicionarCliente() {
      const nome = document.getElementById('nome').value.trim();
      const municipio = document.getElementById('municipio').value.trim();
      if (!nome || !municipio) { alert('Preencha os dois campos.'); return; }
      const form = new FormData();
      form.append('nome', nome);
      form.append('municipio', municipio);
      await fetch('/api/clientes', { method: 'POST', body: form });
      document.getElementById('nome').value = '';
      document.getElementById('municipio').value = '';
      const msg = document.getElementById('msg-sucesso');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
      await carregar();
    }

    async function remover(id) {
      if (!confirm('Remover este cliente?')) return;
      await fetch('/api/clientes/' + id, { method: 'DELETE' });
      await carregar();
    }

    carregar();
  </script>
</body>
</html>
