<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Suporte Técnico</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f4f3ef; min-height: 100vh; }
    .topbar { background: #1a1a18; padding: 0 24px; height: 48px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 13px; font-weight: 600; color: #e8e6de; letter-spacing: .04em; }
    .nav a { font-size: 12px; padding: 5px 14px; border-radius: 6px; text-decoration: none; font-weight: 500; color: #888; border: 1px solid #333; }
    .nav a:hover { background: #2a2a28; color: #e8e6de; }
    .content { padding: 24px; max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 18px; font-weight: 600; color: #1a1a18; margin: 20px 0 16px; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
    .stat { background: #fff; border-radius: 9px; padding: 14px 16px; border: 1px solid #e2e0d8; }
    .stat-label { font-size: 11px; color: #aaa; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px; }
    .stat-val { font-size: 22px; font-weight: 600; color: #1a1a18; }
    .table-card { background: #fff; border-radius: 10px; border: 1px solid #e2e0d8; overflow: hidden; }
    .table-header { padding: 14px 18px; border-bottom: 1px solid #f0ede6; display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 13px; font-weight: 600; color: #1a1a18; }
    .filter-row { display: flex; gap: 6px; }
    .chip { font-family: inherit; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #e2e0d8; background: #fff; cursor: pointer; color: #888; font-weight: 500; }
    .chip.active { background: #1a1a18; color: #e8e6de; border-color: #1a1a18; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: .05em; text-transform: uppercase; padding: 10px 18px; text-align: left; background: #fafaf8; border-bottom: 1px solid #f0ede6; }
    td { font-size: 12px; color: #3a3a36; padding: 11px 18px; border-bottom: 1px solid #f7f5f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }
    .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
    .badge.aberto { background: #e8f5ee; color: #2d7a52; }
    .badge.pendente_dev { background: #fef3e2; color: #b86e0e; }
    .badge.em_correcao { background: #fde8e8; color: #b83535; }
    .badge.fechado { background: #f0ede6; color: #888; }
    .id-col { font-family: monospace; font-size: 11px; color: #888; }
    .qid-col { font-family: monospace; font-size: 11px; color: #b86e0e; }
    .qid-empty { font-size: 11px; color: #ccc; font-style: italic; }
    .ver-btn { font-family: inherit; font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid #e2e0d8; background: transparent; cursor: pointer; color: #555; }
    .ver-btn:hover { background: #1a1a18; color: #e8e6de; border-color: #1a1a18; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 10; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; width: 560px; max-width: 90%; border: 1px solid #e2e0d8; display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 15px; font-weight: 600; color: #1a1a18; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: #aaa; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-field { display: flex; flex-direction: column; gap: 3px; }
    .modal-label { font-size: 10px; font-weight: 600; color: #aaa; letter-spacing: .06em; text-transform: uppercase; }
    .modal-value { font-size: 13px; color: #1a1a18; line-height: 1.6; }
    .divider { height: 1px; background: #f0ede6; }
    .qualitor-box { border: 1.5px solid #d0a855; border-radius: 9px; background: #fffbf0; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .qualitor-title { font-size: 11px; font-weight: 600; color: #b86e0e; text-transform: uppercase; }
    .qualitor-row { display: flex; gap: 8px; }
    .qualitor-row input { font-family: monospace; font-size: 13px; padding: 8px 12px; border: 1px solid #e2c97a; border-radius: 7px; background: #fff; color: #1a1a18; outline: none; flex: 1; }
    .btn-vincular { font-family: inherit; font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: 7px; border: none; background: #b86e0e; color: #fff; cursor: pointer; }
    .resposta-area { display: flex; flex-direction: column; gap: 6px; }
    .resposta-textarea { font-family: inherit; font-size: 13px; padding: 10px 12px; border: 1px solid #e2e0d8; border-radius: 7px; background: #fafaf8; color: #1a1a18; outline: none; resize: none; height: 80px; line-height: 1.5; width: 100%; }
    .resposta-textarea:focus { border-color: #1a1a18; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-primary { font-family: inherit; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 7px; background: #1a1a18; color: #e8e6de; border: none; cursor: pointer; }
    .btn-secondary { font-family: inherit; font-size: 12px; font-weight: 500; padding: 8px 16px; border-radius: 7px; background: transparent; color: #888; border: 1px solid #e2e0d8; cursor: pointer; }
    .evidencia-link { font-size: 12px; color: #185fa5; text-decoration: none; }
    .evidencia-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">SUPORTE · TÉCNICO</div>
    <div class="nav">
      <a href="/logout">Sair</a>
    </div>
  </div>

  <div class="content">
    <h1>Dashboard</h1>
    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">Abertos</div><div class="stat-val" id="s-aberto" style="color:#2d8a5e">0</div></div>
      <div class="stat"><div class="stat-label">Pendente dev</div><div class="stat-val" id="s-pendente" style="color:#b86e0e">0</div></div>
      <div class="stat"><div class="stat-label">Fechados</div><div class="stat-val" id="s-fechado" style="color:#888">0</div></div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Chamados</div>
        <div class="filter-row">
          <button class="chip active" onclick="filtrar('todos', this)">Todos</button>
          <button class="chip" onclick="filtrar('aberto', this)">Abertos</button>
          <button class="chip" onclick="filtrar('pendente_dev', this)">Pendente</button>
          <button class="chip" onclick="filtrar('fechado', this)">Fechados</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID interno</th>
            <th>ID Qualitor</th>
            <th>Cliente</th>
            <th>Colaborador</th>
            <th>Status</th>
            <th>Data</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Detalhe do chamado</div>
        <button class="modal-close" onclick="fecharModal()">×</button>
      </div>
      <div class="modal-grid">
        <div class="modal-field"><div class="modal-label">ID interno</div><div class="modal-value" id="m-id"></div></div>
        <div class="modal-field"><div class="modal-label">Status</div><div class="modal-value" id="m-status"></div></div>
        <div class="modal-field"><div class="modal-label">Cliente</div><div class="modal-value" id="m-cliente"></div></div>
        <div class="modal-field"><div class="modal-label">Colaborador</div><div class="modal-value" id="m-email"></div></div>
      </div>
      <div class="modal-field"><div class="modal-label">Descrição técnica</div><div class="modal-value" id="m-desc"></div></div>
      <div class="modal-field" id="m-evidencia-wrap" style="display:none"><div class="modal-label">Evidência</div><div class="modal-value"><a id="m-evidencia" class="evidencia-link" target="_blank">Ver arquivo</a></div></div>
      <div class="divider"></div>
      <div class="qualitor-box">
        <div class="qualitor-title">ID Qualitor</div>
        <div class="qualitor-row">
          <input type="text" id="qualitor-input" placeholder="Ex: 48271"/>
          <button class="btn-vincular" onclick="vincularQualitor()">Salvar</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="resposta-area">
        <div class="modal-label">Resposta do parceiro</div>
        <textarea class="resposta-textarea" id="resposta-input" placeholder="Cole aqui a resposta recebida no Qualitor..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="fecharModal()">Fechar</button>
        <button class="btn-primary" onclick="salvarResposta()">Salvar resposta</button>
      </div>
    </div>
  </div>

  <script>
    let todos = [];
    let filtroAtual = 'todos';
    let chamadoAtualId = '';

    function badge(status) {
      const labels = { aberto: 'Aberto', pendente_dev: 'Pendente dev', em_correcao: 'Em correção', fechado: 'Fechado' };
      return `<span class="badge ${status}">${labels[status] || status}</span>`;
    }

    function data(d) { return new Date(d).toLocaleDateString('pt-BR'); }

    function filtrar(f, el) {
      filtroAtual = f;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      const lista = f === 'todos' ? todos : todos.filter(c => c.status === f);
      renderizar(lista);
    }

    function renderizar(lista) {
      const tbody = document.getElementById('lista');
      if (!lista.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#aaa;font-size:13px">Nenhum chamado encontrado.</td></tr>';
        return;
      }
      tbody.innerHTML = lista.map((c, i) => `
        <tr>
          <td class="id-col">${c.id.substring(0,8).toUpperCase()}</td>
          <td>${c.qualitor_id ? `<span class="qid-col">${c.qualitor_id}</span>` : '<span class="qid-empty">— sem vínculo</span>'}</td>
          <td>${c.cliente_nome}</td>
          <td style="font-size:11px;color:#888">${c.colaborador_email || '—'}</td>
          <td>${badge(c.status)}</td>
          <td>${data(c.created_at)}</td>
          <td><button class="ver-btn" onclick="abrirModal('${c.id}')">Ver</button></td>
        </tr>
      `).join('');
    }

    function abrirModal(id) {
      const c = todos.find(x => x.id === id);
      chamadoAtualId = id;
      document.getElementById('m-id').textContent = c.id.substring(0,8).toUpperCase();
      document.getElementById('m-status').innerHTML = badge(c.status);
      document.getElementById('m-cliente').textContent = c.cliente_nome;
      document.getElementById('m-email').textContent = c.colaborador_email || '—';
      document.getElementById('m-desc').textContent = c.descricao_tecnica;
      document.getElementById('qualitor-input').value = c.qualitor_id || '';
      document.getElementById('resposta-input').value = c.resposta_parceiro || '';
      if (c.evidencia_url) {
        document.getElementById('m-evidencia').href = c.evidencia_url;
        document.getElementById('m-evidencia-wrap').style.display = 'block';
      } else {
        document.getElementById('m-evidencia-wrap').style.display = 'none';
      }
      document.getElementById('modal').classList.add('open');
    }

    function fecharModal() { document.getElementById('modal').classList.remove('open'); }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) fecharModal();
    });

    async function vincularQualitor() {
      const qid = document.getElementById('qualitor-input').value.trim();
      if (!qid) return;
      const form = new FormData();
      form.append('qualitor_id', qid);
      await fetch(`/chamado/${chamadoAtualId}/qualitor`, { method: 'POST', body: form });
      await carregar();
      fecharModal();
    }

    async function salvarResposta() {
      const resposta = document.getElementById('resposta-input').value.trim();
      if (!resposta) return;
      const form = new FormData();
      form.append('resposta', resposta);
      await fetch(`/chamado/${chamadoAtualId}/resposta`, { method: 'POST', body: form });
      await carregar();
      fecharModal();
    }

    async function carregar() {
      const res = await fetch('/api/chamados');
      if (res.status === 403) { window.location = '/'; return; }
      todos = await res.json();
      document.getElementById('s-total').textContent = todos.length;
      document.getElementById('s-aberto').textContent = todos.filter(c => c.status === 'aberto').length;
      document.getElementById('s-pendente').textContent = todos.filter(c => c.status === 'pendente_dev').length;
      document.getElementById('s-fechado').textContent = todos.filter(c => c.status === 'fechado').length;
      const lista = filtroAtual === 'todos' ? todos : todos.filter(c => c.status === filtroAtual);
      renderizar(lista);
    }

    carregar();
  </script>
</body>
</html>
