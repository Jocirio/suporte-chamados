<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alterar Senha · Inovatus</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; padding: 40px; width: 420px; max-width: 95%; border: 1px solid #e5e7eb; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #059669; }
    .logo-text { font-size: 15px; font-weight: 600; color: #111; }
    h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 6px; }
    p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 12px; font-weight: 500; color: #6b7280; }
    .field input { padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; color: #111; background: #f9fafb; outline: none; transition: border .15s; }
    .field input:focus { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,.1); }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .btn { width: 100%; padding: 11px; background: #059669; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; margin-top: 8px; }
    .btn:hover { background: #047857; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .alert { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert.erro { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; }
    .alert.sucesso { background: #f0fdf4; border: 1px solid #86efac; color: #059669; }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; text-decoration: none; }
    .back:hover { color: #111; }
    .force-notice { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #92400e; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-text">Inovatus Sistemas</div>
    </div>

    <h1>Alterar Senha</h1>
    <p>Por segurança, crie uma nova senha pessoal para sua conta.</p>

    <div class="force-notice" id="force-notice" style="display:none">
      🔐 Este é seu primeiro acesso. Defina uma senha pessoal antes de continuar.
    </div>

    <div class="alert erro" id="alert-erro"></div>
    <div class="alert sucesso" id="alert-sucesso"></div>

    <div class="field">
      <label>Senha atual</label>
      <input type="password" id="senha-atual" placeholder="Digite sua senha atual">
    </div>
    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="nova-senha" placeholder="Mínimo 6 caracteres">
      <span class="hint">Mínimo 6 caracteres</span>
    </div>
    <div class="field">
      <label>Confirmar nova senha</label>
      <input type="password" id="confirmar-senha" placeholder="Repita a nova senha">
    </div>

    <button class="btn" id="btn-salvar" onclick="salvarSenha()">Salvar nova senha</button>
    <a href="/portal" class="back">← Voltar ao portal</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('primeiro') === '1') {
      document.getElementById('force-notice').style.display = 'block';
    }

    async function salvarSenha() {
      const senhaAtual = document.getElementById('senha-atual').value;
      const novaSenha = document.getElementById('nova-senha').value;
      const confirmar = document.getElementById('confirmar-senha').value;

      document.getElementById('alert-erro').style.display = 'none';
      document.getElementById('alert-sucesso').style.display = 'none';

      if (!senhaAtual) { mostrarErro('Informe sua senha atual.'); return; }
      if (!novaSenha || novaSenha.length < 6) { mostrarErro('A nova senha deve ter no mínimo 6 caracteres.'); return; }
      if (novaSenha !== confirmar) { mostrarErro('As senhas não coincidem.'); return; }
      if (senhaAtual === novaSenha) { mostrarErro('A nova senha deve ser diferente da atual.'); return; }

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      const f = new FormData();
      f.append('senha_atual', senhaAtual);
      f.append('nova_senha', novaSenha);

      try {
        const res = await fetch('/api/minha-senha', { method: 'POST', body: f });
        if (res.ok) {
          mostrarSucesso('Senha alterada com sucesso! Redirecionando...');
          setTimeout(() => window.location.href = '/portal', 2000);
        } else {
          const data = await res.json();
          mostrarErro(data.detail || 'Senha atual incorreta. Tente novamente.');
          btn.disabled = false;
          btn.textContent = 'Salvar nova senha';
        }
      } catch(e) {
        mostrarErro('Erro de conexão. Tente novamente.');
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
      }
    }

    function mostrarErro(msg) {
      const el = document.getElementById('alert-erro');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function mostrarSucesso(msg) {
      const el = document.getElementById('alert-sucesso');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') salvarSenha(); });
  </script>
</body>
</html>
